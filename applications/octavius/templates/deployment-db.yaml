apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: octavius-db
  labels:
    {{- include "octavius.labels" . | nindent 4 }}
spec:
  serviceName: octavius-db
  replicas: {{ .Values.replicaCount_db }}
  selector:
    matchLabels:
      {{- include "octavius.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "octavius.selectorLabels" . | nindent 8 }}
        component: database
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      initContainers:
        - name: init-replica-set
          image: mongo:6
          command:
            - /bin/sh
            - -c
            - |
              if [ "$(hostname)" = "octavius-db-0" ]; then
                echo "Waiting for MongoDB to be ready..."
                until mongo --host octavius-db-0.octavius-db --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                  sleep 2
                done

                echo "Initiating replica set..."
                mongo --host octavius-db-0.octavius-db <<EOF
              rs.initiate({
                _id: "rs0",
                members: [
                  { _id: 0, host: "octavius-db-0.octavius-db:27017" },
                  { _id: 1, host: "octavius-db-1.octavius-db:27017" },
                  { _id: 2, host: "octavius-db-2.octavius-db:27017" }
                ]
              })
              EOF
              else
                echo "Not the first pod, skipping rs.initiate"
              fi
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-root-password
      containers:
        - name: {{ .Chart.Name }}-db
          image: "{{ .Values.imageDB.repository }}:{{ .Values.imageDB.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imageDB.pullPolicy }}
          command: ["mongod"]
          args:
            - "--bind_ip_all"
            - "--replSet=rs0"
          env:
            {{- if .Values.config.slackAlerts }}
            - name: OCTAVIUS_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: slack-webhook
            {{- end }}
            - name: UVICORN_TIMEOUT_KEEP_ALIVE
              value: "61"
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-root-password
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-init-db
            - name: AUTH_DB
              valueFrom:
                secretKeyRef:
                  name: octavius
                  key: mongo-auth-db

          envFrom:
            - configMapRef:
                name: octavius-configmap

          lifecycle:
            preStop:
              sleep:
                seconds: 10

          ports:
            - name: db
              containerPort: 27017
              protocol: TCP

          readinessProbe:
            exec:
              command: ["mongo", "--host", "localhost", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["all"]
            readOnlyRootFilesystem: false

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.imageDB.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.imageDB.persistence.size | quote }}

