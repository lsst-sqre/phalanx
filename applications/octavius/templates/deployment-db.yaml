apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: octavius-db
  labels:
    {{- include "octavius.labels" . | nindent 4 }}
spec:
  serviceName: octavius-db
  replicas: {{ .Values.replicaCount_db }}
  selector:
    matchLabels:
      {{- include "octavius.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "octavius.selectorLabels" . | nindent 8 }}
        component: database
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      initContainers:
        - name: init-keyfile
          image: "{{ .Values.imageDB.repository }}:{{ .Values.imageDB.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              echo $MONGO_KEYFILE_CONTENT > /work/keyfile
              ls -lthra /work/keyfile
              chmod 400 /work/keyfile
          env:
            - name: MONGO_KEYFILE_CONTENT
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: mongo-keyfile
          volumeMounts:
            - name: mongo-keyfile-work
              mountPath: /work
      containers:
        - name: {{ .Chart.Name }}-db
          image: "{{ .Values.imageDB.repository }}:{{ .Values.imageDB.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imageDB.pullPolicy }}
          args:
            - "--bind_ip_all"
            - "--replSet=rs0"
            - "--keyFile=/etc/mongo-keyfile/keyfile"
          env:
            {{- if .Values.config.slackAlerts }}
            - name: OCTAVIUS_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: slack-webhook
            {{- end }}
            - name: UVICORN_TIMEOUT_KEEP_ALIVE
              value: "61"
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: mongo-root-password
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: mongo-init-db
            - name: AUTH_DB
              valueFrom:
                secretKeyRef:
                  name: octavius-secrets
                  key: mongo-auth-db

          lifecycle:
            preStop:
              sleep:
                seconds: 10

          ports:
            - name: db
              containerPort: 27017
              protocol: TCP

          readinessProbe:
            exec:
              command: ["sh","-c","mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-keyfile-work
              mountPath: /etc/mongo-keyfile

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["all"]
            readOnlyRootFilesystem: false

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: mongo-keyfile-work
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.imageDB.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.imageDB.persistence.size | quote }}

