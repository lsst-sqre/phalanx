{{- if .Values.imageDB.persistence.enabled }}
volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: {{ .Values.imageDB.persistence.storageClassName | quote }}
      resources:
        requests:
          storage: {{ .Values.imageDB.persistence.size | quote }}
{{- end }}