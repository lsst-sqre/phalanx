apiVersion: batch/v1
kind: CronJob
metadata:
  name: "weatherbroadcaster-update-weather"
  labels:
    {{- include "weatherbroadcaster.labels" . | nindent 4 }}
    app.kubernetes.io/component: "update-weather"
spec:
  schedule: {{ .Values.updateWeather.schedule | quote }}
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "weatherbroadcaster.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: "update-weather"
        spec:
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumes:
            - name: "tmp"
              emptyDir:
                medium: "Memory"
                sizeLimit: "2Mi"
          automountServiceAccountToken: false
          containers:
            - name: "update-weather"
              command:
                - "python"
                - "-c"
                - "import weatherbroadcaster; weatherbroadcaster.update_weather()"
              {{- if .Values.config.slackAlerts }}
              env:
                - name: "WEATHERBROADCASTER_SLACK_WEBHOOK"
                  valueFrom:
                    secretKeyRef:
                      name: "weatherbroadcaster"
                      key: "slack-webhook"
              {{- end }}
              envFrom:
                - configMapRef:
                    name: "weatherbroadcaster"
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              resources:
                {{- toYaml .Values.updateWeather.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - "all"
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: "tmp"
                  mountPath: "/data"
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: "Never"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
