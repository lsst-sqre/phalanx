# Default values for datalinker.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of web deployment pods to start
replicaCount: 1

image:
  # -- Image to use in the datalinker deployment
  repository: "ghcr.io/lsst-sqre/datalinker"

  # -- Pull policy for the datalinker image
  pullPolicy: "IfNotPresent"

  # -- Overrides the image tag whose default is the chart appVersion.
  tag: null

ingress:
  # -- Additional annotations for the ingresses
  annotations: {}

config:
  # -- Lifetime of the `{links}` reply. Should be set to match the lifetime of
  # links returned by the Butler server
  linksLifetime: "1h"

  # -- Logging level
  logLevel: "INFO"

  metrics:
    # -- Whether to enable sending metrics
    enabled: false

    # -- Name under which to log metrics. Generally there is no reason to
    # change this.
    application: "datalinker"

    events:
      # -- Topic prefix for events. It may sometimes be useful to change this
      # in development environments.
      topicPrefix: "lsst.square.metrics.events"

    schemaManager:
      # -- URL of the Confluent-compatible schema registry server
      # @default -- Sasquatch in the local cluster
      registryUrl: "http://sasquatch-schema-registry.sasquatch.svc.cluster.local:8081"

      # -- Suffix to add to all registered subjects. This is sometimes useful
      # for experimentation during development.
      suffix: ""

  # -- URL path prefix for DataLink and related APIs
  pathPrefix: "/api/datalink"

  sentry:
    # -- Whether to enable the Sentry integration
    enabled: false

  # -- Whether to send certain serious alerts to Slack
  slackAlerts: false

  # -- URL containing TAP schema metadata used to construct queries
  tapMetadataUrl: "https://github.com/lsst/sdm_schemas/releases/download/DP1-v1.2.0/datalink-columns.zip"

# -- Affinity rules for the datalinker deployment pod
affinity: {}

# -- Annotations for the datalinker deployment pod
podAnnotations: {}

# -- Node selection rules for the datalinker deployment pod
nodeSelector: {}

# -- Resource limits and requests for the datalinker deployment pod
# @default -- See `values.yaml`
resources:
  limits:
    cpu: "1"
    memory: "300Mi"
  requests:
    cpu: "50m"
    memory: "125Mi"

# -- Tolerations for the datalinker deployment pod
# @default -- Tolerate GKE arm64 taint
tolerations:
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Name of the Phalanx environment
  # @default -- Set by Argo CD
  environmentName: null

  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base URL for Repertoire discovery API
  # @default -- Set by Argo CD
  repertoireUrl: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
