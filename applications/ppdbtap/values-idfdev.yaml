cadc-tap:
  tapSchema:
    image:
      repository: "lsstsqre/tap-schema-idfdev-tap"

  config:
    backend: "bigquery"
    kafka:
      enabled: true
      kafkaUserName: "ppdbtap-tls"
      topics:
        jobRun: "lsst.ppdbtap.job-run"
        jobStatus: "lsst.ppdbtap.job-status"
        jobDelete: "lsst.ppdbtap.job-delete"

    urlRewrite:
      enabled: true
      rules: "ivoa.ObsCore:access_url, dp02_dc2_catalogs.ObsCore:access_url, dp1.ObsCore:access_url"

    bigquery:
      project: "ppdb-dev-438721"
      dataset: "ppdb_dm50643_1"
      image:
        tag: "tickets-DM-53451"
        pullPolicy: "Always"

  cloudsql:
    enabled: true
    instanceConnectionName: "science-platform-dev-7696:us-central1:science-platform-dev-e9e11de2"
    serviceAccount: "ppdbtap@science-platform-dev-7696.iam.gserviceaccount.com"
    database: "ppdbtap"
