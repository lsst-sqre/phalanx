# -- Override the base name for resources
nameOverride: ""

# -- Override the full name for resources (includes the release name)
fullnameOverride: ""

# Configuration for the ingester, which pulls data out of Kafka and writes
# it to the database backend.

ingester:
  image:
    repository: lsstdm/alert_database_ingester
    tag: ""
    pullPolicy: IfNotPresent

  kafka:
    # -- Name of a Strimzi Kafka cluster to connect to.
    cluster: sasquatch

    # -- Port to connect to on the Strimzi Kafka cluster. It should be an
    # internal listener that expects TLS auth.
    port: 9093

    # -- The username of the Kafka user identity used to connect to the broker.
    user: alert-database-ingester

    # -- Name of the topic which will holds alert data.
    topic:
      - alerts-simulated

  # -- URL of a schema registry instance
  schemaRegistryUrl: "http://sasquatch-schema-registry.sasquatch:8081"

  s3:
    # -- Name of a service account which has credentials granting access to the
    # alert database's backing storage buckets.
    serviceAccountName: ""
    schemaBucket: "rubin-alert-archive"
    alertBucket: "rubin-alert-archive"
    endpointURL: "https://sdfdatas3.slac.stanford.edu/"
    usdf: true

  # -- The name of the Kubernetes ServiceAccount (*not* the Google Cloud IAM
  # service account!) which is used by the alert database ingester.
  serviceAccountName: alert-database-ingester

  # -- set the log level of the application. can be 'info', or 'debug', or
  # anything else to suppress logging.
  logLevel: verbose

  # -- Seconds Kubernetes waits after SIGTERM before sending SIGKILL. Should
  # be long enough for the ingester to finish processing its current batch,
  # commit offsets, and leave the Kafka consumer group cleanly.
  terminationGracePeriodSeconds: 60

  # -- Number of static replicas when autoscaling is disabled.
  replicas: 1

  autoscaling:
    # -- Enable KEDA-based autoscaling for the ingester. When enabled, KEDA
    # manages the replica count based on Kafka consumer group lag.
    enabled: true

    # -- Minimum number of replicas. Set to 0 to allow scale-to-zero.
    minReplicaCount: 3

    # -- Maximum number of replicas the ingester can scale to.
    maxReplicaCount: 10

    # -- Target lag (messages) per partition that triggers scaling.
    lagThreshold: "100"

    # -- Minimum lag per partition required to activate scaling from zero.
    # Only relevant when minReplicaCount is 0.
    activationLagThreshold: "10"

    # -- How often KEDA checks Kafka consumer group lag (seconds).
    pollingInterval: 30

    # -- Period to wait after the last trigger fires before scaling down (seconds).
    cooldownPeriod: 300

    # -- Kafka consumer group to monitor for lag. Must match the consumer
    # group used by the ingester application.
    consumerGroup: "alertdb-ingester"

    # -- Kafka offset reset policy for the KEDA scaler if the consumer group
    # has no committed offset.
    offsetResetPolicy: "latest"

server:
  image:
    repository: lsstdm/alert_database_server
    tag: v4.0.0
    imagePullPolicy: Always

  s3:
    # -- Name of a service account which has credentials granting access to the
    # alert database's backing storage buckets.
    serviceAccountName: ""
    # -- Project ID which has the above GCP IAM service account
    endpointURL: "https://sdfdatas3.slac.stanford.edu/ "
    schemaBucket: "rubin-alert-archive"
    alertBucket: "rubin-alert-archive"

  # -- The name of the Kubernetes ServiceAccount (*not* the Google Cloud IAM
  # service account!) which is used by the alert database server.
  serviceAccountName: alertdb-reader

  # -- set the log level of the application. can be 'info', or 'debug', or
  # anything else to suppress logging.
  logLevel: verbose

  service:
    type: ClusterIP
    port: 3000


storage:
  s3:
    # -- Name of a s3 storage bucket with alert data
    alertBucket: "rubin-alert-archive"
    # -- Name of a s3 storage bucket with schema data
    schemaBucket: "rubin-alert-archive"
    endpointURL: "https://sdfdatas3.slac.stanford.edu/"

ingress:
  # -- Whether to create an ingress
  enabled: false

  # Additional annotations to add to the ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"

  # -- Hostname for the ingress
  # @default -- None, must be set if the ingress is enabled
  host: ""

  # -- Configures TLS for the ingress if needed. If multiple ingresses share
  # the same hostname, only one of them needs a TLS configuration.
  tls: []

  # -- Subpath to host the alert database application under the ingress
  path: "/v1"
