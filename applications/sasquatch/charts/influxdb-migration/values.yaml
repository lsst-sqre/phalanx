# Default values for influxdb-migration.

image:
  # -- Image to use in the influxdb-migration deployment
  repository: "ghcr.io/lsst-sqre/sasquatch"
  # -- Pull policy for the influxdb-migration image
  pullPolicy: "IfNotPresent"

  # -- Tag of image to use
  # @default -- The appVersion of the chart
  tag: ""

# -- Affinity rules for the influxdb-migration deployment pod
affinity: {}

# -- Node selection rules for the influxdb-migration deployment pod
nodeSelector: {}

# -- Annotations for the influxdb-migration deployment pod
podAnnotations: {}

# -- Resource limits and requests for the influxdb-migration deployment pod
resources: {}

# -- Tolerations for the influxdb-migration deployment pod
tolerations: []
