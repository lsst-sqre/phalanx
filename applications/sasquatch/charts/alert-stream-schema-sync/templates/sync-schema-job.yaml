apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-sync-schema"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
    argocd.argoproj.io/hook: Sync
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
      annotations:
        description: "Load schemas into registry."
    spec:
      restartPolicy: Never
      containers:
      - name: sync-schema-job
        image: "{{ .Values.schemaSync.image.repository }}:{{ .Values.schemaSync.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: "{{ .Values.schemaSync.image.pullPolicy}}"
        command:
          - "syncAllSchemasToRegistry"
          - "--schema-registry-url={{ .Values.schemaRegistryUrl }}"
          - "--subject={{ .Values.schemaSync.subject }}"
