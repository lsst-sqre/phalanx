strimzi-kafka:
  kafka:
    listeners:
      tls:
        enabled: true
      plain:
        enabled: true
      external:
        enabled: true
    externalListener:
      tls:
        enabled: true
      bootstrap:
        loadBalancerIP: "34.55.132.0"
        host: sasquatch-kafka-bootstrap.lsst.cloud
      brokers:
        - broker: 0
          loadBalancerIP: "35.192.187.249"
          host: sasquatch-kafka-0.lsst.cloud
        - broker: 1
          loadBalancerIP: "34.29.173.204"
          host: sasquatch-kafka-1.lsst.cloud
        - broker: 2
          loadBalancerIP: "34.123.107.123"
          host: sasquatch-kafka-2.lsst.cloud
  users:
    telegraf:
      enabled: true
  controller:
    enabled: true
  broker:
    enabled: true
    storage:
      size: 500Gi

schema-registry:
  enabled: true
  ingress:
    enabled: true

influxdb:
  ingress:
    enabled: false
    hostname: data.lsst.cloud
  resources:
    requests:
      memory: 16Gi
      cpu: 1
    limits:
      memory: 16Gi
      cpu: 2

customInfluxDBIngress:
  enabled: true
  hostname: data.lsst.cloud

telegraf:
  enabled: true
  kafkaConsumers:
    example:
      enabled: false

kafdrop:
  ingress:
    enabled: true

chronograf:
  ingress:
    enabled: true
    hostname: data.lsst.cloud

  env:
    GENERIC_NAME: "OIDC"
    GENERIC_AUTH_URL: https://data.lsst.cloud/auth/openid/login
    GENERIC_TOKEN_URL: https://data.lsst.cloud/auth/openid/token
    USE_ID_TOKEN: 1
    JWKS_URL: https://data.lsst.cloud/.well-known/jwks.json
    GENERIC_API_URL: https://data.lsst.cloud/auth/openid/userinfo
    GENERIC_SCOPES: openid
    GENERIC_API_KEY: sub
    PUBLIC_URL: https://data.lsst.cloud/
    STATUS_FEED_URL: https://raw.githubusercontent.com/lsst-sqre/rsp_broadcast/main/jsonfeeds/idfprod.json

app-metrics:
  enabled: true
  apps:
    - gafaelfawr
    - mobu
    - noteburst
    - nublado
    - qservkafka
    - repertoire
    - sia
    - wobbly

backup:
  enabled: true
  schedule: "0 5 * * *"
  persistence:
    size: 500Gi
    storageClass: standard
  backupItems:
    - name: "chronograf"
      enabled: true
      retentionDays: 7
    - name: "kapacitor"
      enabled: true
      retentionDays: 7
    - name: "influxdb-oss-full"
      enabled: true
      retentionDays: 3

tap:
  enabled: true
