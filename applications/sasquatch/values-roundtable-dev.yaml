strimzi-kafka:
  kafka:
    listeners:
      plain:
        enabled: true
      tls:
        enabled: true
      external:
        enabled: false
  users:
    telegraf:
      enabled: true
  controller:
    enabled: true
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: "strimzi.io/pool-name"
                  operator: "In"
                  values:
                    - "controller"
            topologyKey: "kubernetes.io/hostname"
  broker:
    enabled: true
    storage:
      size: 100Gi
      storageClassName: "premium-rwo"
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: "strimzi.io/pool-name"
                  operator: "In"
                  values:
                    - "kafka"
            topologyKey: "kubernetes.io/hostname"
  connect:
    enabled: false
  mirrormaker2:
    enabled: false

schema-registry:
  enabled: true

influxdb:
  enabled: true

customInfluxDBIngress:
  enabled: true
  hostname: roundtable-dev.lsst.cloud

telegraf:
  enabled: false

kapacitor:
  enabled: false

kafdrop:
  enabled: true
  ingress:
    enabled: true
  kafka:
    topicPrefixes:
      - "lsst.square-events.squarebot.slack.interaction"

rest-proxy:
  enabled: false

chronograf:
  enabled: true
  ingress:
    enabled: true
    hostname: roundtable-dev.lsst.cloud

  env:
    GENERIC_NAME: "OIDC"
    GENERIC_AUTH_URL: https://roundtable-dev.lsst.cloud/auth/openid/login
    GENERIC_TOKEN_URL: https://roundtable-dev.lsst.cloud/auth/openid/token
    USE_ID_TOKEN: 1
    JWKS_URL: https://roundtable-dev.lsst.cloud/.well-known/jwks.json
    GENERIC_API_URL: https://roundtable-dev.lsst.cloud/auth/openid/userinfo
    GENERIC_SCOPES: openid
    GENERIC_API_KEY: sub
    PUBLIC_URL: https://roundtable-dev.lsst.cloud/
    STATUS_FEED_URL: https://raw.githubusercontent.com/lsst-sqre/rsp_broadcast/main/jsonfeeds/roundtable-dev.json

squareEvents:
  enabled: true
