x-pod-antiaffinity:
  &pod-antiaffinity
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: csc-name
              operator: Exists
          topologyKey: kubernetes.io/hostname

automatic-transfer-switch-ess309-sim:
  enabled: true
  classifier: ess309
  image:
    repository: ts-dockerhub.lsst.org/ess
  env:
    RUN_ARG: 309 --simulate
  <<: *pod-antiaffinity
  resources:
    requests:
      cpu: 19m
      memory: 180Mi
    limits:
      cpu: 190m
      memory: 360Mi

