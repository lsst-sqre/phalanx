# Default values for hips.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of web deployment pods to start
replicaCount: 1

config:
  # -- A mapping of bucket keys to GCS buckets.
  # /api/hips/v2/<bucket-key>/some/file will serve the file
  # <objectPrefix>/some/file from the corresponding bucket.
  # @default -- None, must be set
  buckets: null
    # dp02:
    #   bucketName: somebucket
    # dp1:
    #   bucketName: somebucket
    #   objectPrefix: someprefix

  # -- Max age of resources in client caches (seconds)
  cacheMaxAge: 3600

  # -- The key of bucket in the 'buckets' dict to serve from the v1 endpoint
  # (/api/hips)
  defaultBucketKey: null

  # -- Google Cloud project in which the underlying storage is located
  # @default -- None, must be set
  gcsProject: ""

  # -- Choose from the text form of Python logging levels
  logLevel: "INFO"

  # -- Logging profile (`production` for JSON, `development` for
  # human-friendly)
  logProfile: "production"

  # -- URL path prefix (current API)
  pathPrefix: "/api/hips/v2"

  # -- The Google service account that has an IAM binding to the `hips`
  # Kubernetes service account and has access to the storage bucket
  # @default -- None, must be set
  serviceAccount: ""

  # -- Whether to send Slack alerts for unexpected failures
  slackAlerts: false

  # -- URL path prefix (legacy API)
  v1PathPrefix: "/api/hips"

image:
  # -- Image to use in the crawlspace deployment
  repository: "ghcr.io/lsst-sqre/crawlspace"

  # -- Pull policy for the hips image
  pullPolicy: "IfNotPresent"

  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

ingress:
  # -- Additional annotations for the ingress
  annotations: {}

# -- Affinity rules for the crawlspace deployment pod
affinity: {}

# -- Node selection rules for the crawlspace deployment pod
nodeSelector: {}

# -- Annotations for the crawlspace deployment pod
podAnnotations: {}

# -- Resource limits and requests for the crawlspace deployment pod
# @default -- See `values.yaml`
resources:
  limits:
    cpu: "1"
    memory: "256Mi"
  requests:
    cpu: "1m"
    memory: "45Mi"

# -- Tolerations for the Repertoire pod
# @default -- Tolerate GKE amd64 and arm64 taints
tolerations:
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "amd64"
    effect: "NoSchedule"
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
