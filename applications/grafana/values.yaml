# Default values for grafana.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Base URL for the environment
  # @default -- Set by Argo CD
  baseUrl: null

  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null

# -- Config for the grafana-operator, which is a dependency of this chart
# @default -- [chart values](https://github.com/grafana/grafana-operator/blob/master/deploy/helm/grafana-operator/values.yaml)
grafana-operator: {}

# -- Config for the Grafana instance
# @default -- See values.yaml
grafana:
  # -- Path prefix for Grafana.
  pathPrefix: "grafana"

  ingress:
    # -- Additional annotations to add to the ingress
    annotations: {}

  # -- Config for the Grafana CRD.
  # [Docs](https://grafana.github.io/grafana-operator/docs/api/#grafanaspec)
  spec:
    persistentVolumeClaim:
      spec:
        accessModes:
          - "ReadWriteOnce"
        storageClassName: null
        resources:
          requests:
            storage: "10Gi"
    deployment:
      spec:
        template:
          spec:
            containers:
              - name: "grafana"
                readinessProbe:
                  failureThreshold: 3
                resources:
                   limits:
                     cpu: "1"
                     memory: "1Gi"
                   requests:
                     cpu: "100m"
                     memory: "256Mi"
                env:
                  - name: "GF_SECURITY_ADMIN_PASSWORD"
                    valueFrom:
                      secretKeyRef:
                        key: "grafana-admin-password"
                        name: grafana
                envFrom:

                  # Because helm doesn't render the values file, any values
                  # that need to be rendered (like `global` values) need to
                  # go in this config map to be set via env vars.
                  - configMapRef:
                      name: grafana-injected

            # https://github.com/grafana/grafana-operator/issues/1439#issuecomment-2677822604
            # ...but why?
            securityContext:
              fsGroup: 1001
              runAsGroup: 1001
              runAsNonRoot: true
              runAsUser: 1001
            volumes:
              - name: "grafana-data"
                persistentVolumeClaim:
                  claimName: grafana-pvc
        strategy:
          type: Recreate

      # -- Grafana instance config options.
      # [Docs](https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/)
    config:
      security:
        # security.password is injected via the phalanx secret
        admin_user: "grafana-admin"
      server:
        # server.domain and server.root_url are injected via env vars from
        # the grafana-injected configmap
        serve_from_subpath: "true"
      auth:
        # We'll assume that Gafaelfawr has already auth'd any requests that come in
        disable_login_form: "true"
      auth.proxy:
        enabled: "true"
        # HTTP Header name that will contain the username or email
        header_name: "X-Auth-Request-User"
        # HTTP Header property, `username` or `email`
        header_property: "username"
        # Set to `true` to enable auto sign up of users who do not exist in Grafana DB.
        auto_sign_up: "true"
        # Optionally define more headers to sync other user attributes
        # Example `headers = Name:X-WEBAUTH-NAME Role:X-WEBAUTH-ROLE Email:X-WEBAUTH-EMAIL Groups:X-WEBAUTH-GROUPS`
        # headers: "Email: X-Auth-Request-Email"

        # With enable_login_token set to true Grafana will, after successful
        # auth proxy header validation, assign the user a login token and
        # cookie. You only have to configure your auth proxy to provide
        # headers for the /login route. Requests via other routes will be
        # authenticated using the cookie.
        #
        # We set this to false here because Gafaelfawr will auth every request.
        enable_login_token: "false"
