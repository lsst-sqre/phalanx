{{- if .Values.config.updateSchema -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: "semaphore"
  annotations:
    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-delete-policy: "hook-succeeded"
    helm.sh/hook-weight: "1"
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "semaphore.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: "schema-update"
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.cloudsql.enabled }}
      serviceAccountName: "semaphore"
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          command:
            - "semaphore"
            - "update-schema"
          env:
            - name: "SEMAPHORE_DATABASE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: "semaphore"
                  key: "database-password"
            - name: "SEMAPHORE_GITHUB_WEBHOOK_SECRET"
              valueFrom:
                secretKeyRef:
                  name: "semaphore"
                  key: "SEMAPHORE_GITHUB_WEBHOOK_SECRET"
            - name: "SEMAPHORE_GITHUB_APP_PRIVATE_KEY"
              valueFrom:
                secretKeyRef:
                  name: "semaphore"
                  key: "SEMAPHORE_GITHUB_APP_PRIVATE_KEY"
            {{- if .Values.config.slackAlerts }}
            - name: "SEMAPHORE_SLACK_WEBHOOK"
              valueFrom:
                secretKeyRef:
                  name: "semaphore"
                  key: "slack-webhook"
            {{- end }}
            {{- if .Values.config.sentry.enabled }}
            - name: "SENTRY_DSN"
              valueFrom:
                secretKeyRef:
                  name: "semaphore"
                  key: "sentry-dsn"
            - name: "SENTRY_ENVIRONMENT"
              value: {{ .Values.global.environmentName }}
            - name: "SENTRY_TRACES_SAMPLE_RATE"
              value: {{ .Values.config.sentry.tracesSampleRate }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: "semaphore"
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - "all"
            readOnlyRootFilesystem: true
      {{- if .Values.cloudsql.enabled }}
      initContainers:
        {{- include "semaphore.cloudsqlSidecar" . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: "Never"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
