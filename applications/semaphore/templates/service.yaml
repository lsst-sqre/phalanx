apiVersion: v1
kind: Service
metadata:
  name: "semaphore"
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  type: "ClusterIP"
  ports:
    - port: 80
      targetPort: "http"
      protocol: "TCP"
      name: "http"
  selector:
    {{- include "semaphore.selectorLabels" . | nindent 4 }}
