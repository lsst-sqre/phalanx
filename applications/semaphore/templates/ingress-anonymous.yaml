apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "semaphore-anonymous"
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  ingressClassName: "nginx"
  rules:
    - host: {{ required "global.host must be set" .Values.global.host | quote }}
      http:
        paths:
          - path: "{{ .Values.config.pathPrefix }}/"
            pathType: "Exact"
            backend:
              service:
                name: "semaphore"
                port:
                  number: 80
          - path: "{{ .Values.config.pathPrefix }}/github/webhook"
            pathType: "Exact"
            backend:
              service:
                name: "semaphore"
                port:
                  number: 80
          - path: "{{ .Values.config.pathPrefix }}/openapi.json"
            pathType: "Exact"
            backend:
              service:
                name: "semaphore"
                port:
                  number: 80
          - path: "{{ .Values.config.pathPrefix }}/v1/broadcasts"
            pathType: "Exact"
            backend:
              service:
                name: "semaphore"
                port:
                  number: 80
