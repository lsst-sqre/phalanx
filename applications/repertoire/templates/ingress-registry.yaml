{{- if .Values.config.registry }}
apiVersion: gafaelfawr.lsst.io/v1alpha1
kind: GafaelfawrIngress
metadata:
  name: "repertoire-registry"
  labels:
    {{- include "repertoire.labels" . | nindent 4 }}
config:
  scopes:
    anonymous: true
template:
  metadata:
    name: "repertoire-registry"
    {{- with .Values.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  spec:
    rules:
      - host: {{ required "global.host must be set" .Values.global.host | quote }}
        http:
          paths:
            - path: "{{ .Values.config.registry.pathPrefix }}"
              pathType: "Prefix"
              backend:
                service:
                  name: "repertoire"
                  port:
                    number: 8080
{{- end }}
