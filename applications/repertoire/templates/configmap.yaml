apiVersion: v1
kind: ConfigMap
metadata:
  name: "repertoire"
  labels:
    {{- include "repertoire.labels" . | nindent 4 }}
data:
  REPERTOIRE_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REPERTOIRE_PATH_PREFIX: {{ .Values.config.pathPrefix | quote }}
  REPERTOIRE_PROFILE: {{ .Values.config.logProfile | quote }}
