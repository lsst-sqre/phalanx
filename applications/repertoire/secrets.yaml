tap-database-password:
  description: >-
    Database password for tap service, used by repertoire to manage
    tap TAP_SCHEMA. Copied from tap application's database-password.
  if: config.tapServers.tap.enabled
  copy:
    application: tap
    key: uws-db-password
ssotap-database-password:
  description: >-
    Database password for ssotap service, used by repertoire to manage
    ssotap TAP_SCHEMA. Copied from ssotap application's database-password.
  if: config.tapServers.ssotap.enabled
  copy:
    application: ssotap
    key: uws-db-password
livetap-database-password:
  description: >-
    Database password for livetap service, used by repertoire to manage
    consdbtap TAP_SCHEMA. Copied from livetap application's database-password.
  if: config.tapServers.livetap.enabled
  copy:
    application: livetap
    key: uws-db-password
sentry-dsn:
  description: >-
    DSN URL to which Sentry trace and error logging will be sent.
  if: config.sentry.enabled
slack-webhook:
  description: >-
    Slack web hook used to report internal errors to Slack. This secret may be
    changed at any time.
  if: config.slackAlerts
  copy:
    application: mobu
    key: app-alert-webhook
