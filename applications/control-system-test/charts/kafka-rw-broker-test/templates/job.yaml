apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-broker-rw-test
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kafka-broker-rw-test
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: csc-env-config
          env:
            - name: LSST_KAFKA_SECURITY_MECHANISM
              value: SCRAM-SHA-512
            - name: LSST_KAFKA_SECURITY_PROTOCOL
              value: SASL_PLAINTEXT
            - name: LSST_KAFKA_SECURITY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: control-system-test
                  key: ts-salkafka-password
            - name: TOPIC
              value: {{ .Values.kafka.topic | quote }}
            - name: PARTITIONS
              value: {{ .Values.kafka.partitions | quote }}
            - name: REPLICATION_FACTOR
              value: {{ .Values.kafka.replicationFactor | quote }}
            - name: RETENTION_MS
              value: {{ .Values.kafka.retentionMs | int64 | quote }}
            - name: NUM_RECORDS
              value: {{ .Values.test.numRecords | quote }}
            - name: RECORD_SIZE
              value: {{ .Values.test.recordSize | quote }}
            - name: THROUGHPUT
              value: {{ .Values.test.throughput | quote }}
            - name: TIMEOUT_MS
              value: {{ .Values.test.timeoutMs | quote }}

          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== Kafka broker read/write test starting ==="
              echo "Environment: ${LSST_SITE}"
              echo "Topic: ${TOPIC}"

              KAFKA_BIN="/opt/kafka/bin"
              CLIENT_PROPERTIES="/tmp/client.properties"

              cat > "${CLIENT_PROPERTIES}" <<EOF
              security.protocol=${LSST_KAFKA_SECURITY_PROTOCOL}
              sasl.mechanism=${LSST_KAFKA_SECURITY_MECHANISM}
              sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${LSST_KAFKA_SECURITY_USERNAME}" password="${LSST_KAFKA_SECURITY_PASSWORD}";
              EOF

              echo "RETENTION_MS=${RETENTION_MS}"
              printf 'RETENTION_MS shell-quoted: <%q>\n' "${RETENTION_MS}"

              "${KAFKA_BIN}/kafka-topics.sh" \
                --bootstrap-server "${LSST_KAFKA_BROKER_ADDR}" \
                --create \
                --if-not-exists \
                --topic "${TOPIC}" \
                --partitions "${PARTITIONS}" \
                --replication-factor "${REPLICATION_FACTOR}" \
                --config "retention.ms=${RETENTION_MS}" \
                --config "cleanup.policy=delete" \
                --command-config "${CLIENT_PROPERTIES}"

              echo "=== Topic description ==="
              "${KAFKA_BIN}/kafka-topics.sh" \
                --bootstrap-server "${LSST_KAFKA_BROKER_ADDR}" \
                --describe \
                --topic "${TOPIC}" \
                --command-config "${CLIENT_PROPERTIES}"

              echo "=== Producer/write test ==="
              "${KAFKA_BIN}/kafka-producer-perf-test.sh" \
                --bootstrap-server "${LSST_KAFKA_BROKER_ADDR}" \
                --topic "${TOPIC}" \
                --num-records "${NUM_RECORDS}" \
                --record-size "${RECORD_SIZE}" \
                --throughput "${THROUGHPUT}" \
                --command-config "${CLIENT_PROPERTIES}"

              echo "=== Consumer/read test ==="
              GROUP_ID="broker-rw-test-$(date +%Y%m%d%H%M%S)"

              "${KAFKA_BIN}/kafka-consumer-perf-test.sh" \
                --bootstrap-server "${LSST_KAFKA_BROKER_ADDR}" \
                --topic "${TOPIC}" \
                --group "${GROUP_ID}" \
                --messages "${NUM_RECORDS}" \
                --timeout "${TIMEOUT_MS}" \
                --command-config "${CLIENT_PROPERTIES}"

              echo "=== Kafka broker read/write test finished ==="
