image:
  pullPolicy: Always
  tag: "tickets-DM-55386-linkcheck-bot-blocks"

config:
  databaseUrl: "postgresql://ook@localhost/ook"
  linkcheck:
    # Temporarily shortened from the 24h default for the DM-55386
    # bot-block investigation so resubmitted checks re-fetch URLs
    # instead of serving stored results. Revert with the image
    # override at teardown.
    freshnessTtl: "5m"
  algolia:
    documentIndex: "document_dev"
  updateSchema: true
  migrateCountryCodes: true
audit:
  enabled: true
  schedule: "30 2 * * *"
  reingest: true
ingestUpdated:
  enabled: true
  window: "2d"
  schedule: "30 3 * * *"
linkcheckRecheck:
  enabled: true
  schedule: "45 4 * * *"
ingestLsstTexmf:
  enabled: true

cloudsql:
  enabled: true
  instanceConnectionName: "roundtable-prod-f6fd:us-central1:roundtable-prod-f119ac3d"
  serviceAccount: "ook-sa@roundtable-prod-f6fd.iam.gserviceaccount.com"
