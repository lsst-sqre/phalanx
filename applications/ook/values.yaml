# Default values for squarebot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#
# Global parameters will be set by parameters injected by Argo CD and should
# not be set in the individual environment values files.
global:
  # -- Base URL for the environment
  # @default -- Set by Argo CD
  baseUrl: null

  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

# -- Number of API pods to run
replicaCount: 1

image:
  # -- Squarebot image repository
  repository: ghcr.io/lsst-sqre/ook

  # -- Image pull policy
  pullPolicy: IfNotPresent

  # -- Tag of the image
  # @default -- The appVersion of the chart
  tag: ""

# -- Secret names to use for all Docker pulls
imagePullSecrets: []

# -- Override the base name for resources
nameOverride: ""

# -- Override the full name for resources (includes the release name)
fullnameOverride: ""

# -- Annotations for API and worker pods
podAnnotations: {}

service:
  # -- Type of service to create
  type: ClusterIP

  # -- Port of the service to create and map to the ingress
  port: 80

ingress:
  # -- Additional annotations to add to the ingress
  annotations: {}

  # -- Path prefix where Squarebot is hosted
  path: "/ook"

# -- Resource requests and limits for Ook pod
# @default -- See `values.yaml`
resources:
  limits:
    cpu: "1"
    memory: "256Mi"
  requests:
    cpu: "120m"
    memory: "125Mi"

nodeSelector: {}

tolerations: []

affinity: {}

config:
  # -- Logging level: "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
  logLevel: "INFO"

  # -- Database URL
  databaseUrl: ""

  # -- Whether to run the database migration job
  # @default -- false to disable schema upgrades
  updateSchema: false

  # -- Whether to migrate country codes in the database
  # @default -- false to disable country code migration
  migrateCountryCodes: false

  topics:
    # -- Kafka topic name for ingest events
    ingest: "lsst.square-events.ook.ingest"

    # -- Kafka topic name for link-check execution requests
    linkcheck: "lsst.square-events.ook.linkcheck"

  algolia:
    # -- Name of the Algolia index for documents
    documents_index: "documents_dev"

  linkcheck:
    # -- Total timeout applied to each link-check HTTP request
    requestTimeout: "30s"

    # -- Maximum number of concurrent link-check HTTP requests across all
    # hosts
    maxConcurrency: 10

    # -- Minimum politeness interval between link-check requests to the same
    # host
    hostInterval: "1s"

    # -- Override for the User-Agent header sent on every link-check request.
    # Leave empty to use Ook's built-in browser-prefixed hybrid default, which
    # carries the running Ook version and repo URL
    userAgent: ""

    # -- Age below which a URL's stored check result is considered fresh and
    # is not rechecked on submission
    freshnessTtl: "24h"

    # -- Maximum number of unique canonical URLs accepted in a single
    # link-check submission
    maxUrlsPerCheck: 1000

    # -- Minimum span of consecutive failures before a previously-OK link is
    # declared broken instead of failing
    brokenThreshold: "48h"

    # -- Minimum number of consecutive failed attempts before a previously-OK
    # link is declared broken instead of failing
    brokenMinAttempts: 3

    # -- Delays until the next recheck of a failing link, indexed by the
    # number of consecutive failures so far
    recheckIntervals:
      - "1h"
      - "4h"
      - "24h"
      - "48h"

    # -- Delay until the next recheck of a broken link, revisited at this slow
    # cadence so a since-fixed link can heal without waiting to be resubmitted
    brokenRecheckInterval: "24h"

    # -- Delay until the next recheck of a bot-blocked link, revisited at this
    # near-term cadence because a block is inconclusive and tends to flap
    blockedRecheckInterval: "1h"

    # -- Age beyond which link-check submission records are purged by the
    # scheduled linkcheck-recheck maintenance command
    checkRetention: "30d"

  intersphinx:
    # -- Freshness TTL for cached intersphinx inventories. An inventory
    # fetched within this window is served as a fresh cache hit; an older one
    # is served stale on the request path while the refresh job revalidates
    # it
    ttl: "1h"

    # -- Negative-cache TTL for cold-miss intersphinx inventory fetch
    # failures. A repeat request inside this window returns the error without
    # re-contacting upstream
    negativeTtl: "5m"

    # -- Active window for the intersphinx refresh job. The scheduled refresh
    # only revalidates cached inventories requested by a client within this
    # window; inventories last requested longer ago are skipped (not deleted)
    activeWindow: "30d"

audit:
  # -- Enable the audit job
  enabled: true

  # -- Cron schedule string for ook audit job (UTC)
  schedule: "15 2 * * *"

  # -- Time (second) to keep a finished job before cleaning up
  ttlSecondsAfterFinished: 86400

  # -- Reingest missing documents
  reingest: true

  # -- Resource limits and requests for Ook audit pods
  resources: {}

  # -- Annotations for Ook audit pods
  podAnnotations: {}

  # -- Node selection rules for Ook audit pods
  nodeSelector: {}

  # -- Tolerations for Ook audit pods
  tolerations: []

  # -- Affinity rules for Ook audit pods
  affinity: {}

ingestUpdated:
  # -- Enable the ingest-updated job
  enabled: false

  # -- Time window to look for updated documents (e.g. 1h, 2d, 3w). This must
  # be set to a value greater than the cron schedule for the ingest-updated job.
  window: "2d"

  # -- Cron schedule string for ook audit job (UTC)
  schedule: "15 3 * * *"

  # -- Time (second) to keep a finished job before cleaning up
  ttlSecondsAfterFinished: 86400

  # -- Resource limits and requests for Ook audit pods
  resources: {}

  # -- Annotations for Ook audit pods
  podAnnotations: {}

  # -- Node selection rules for Ook audit pods
  nodeSelector: {}

  # -- Tolerations for Ook audit pods
  tolerations: []

  # -- Affinity rules for Ook audit pods
  affinity: {}

linkcheckRecheck:
  # -- Enable the linkcheck-recheck job
  enabled: false

  # -- Cron schedule string for the ook linkcheck-recheck job (UTC)
  schedule: "45 4 * * *"

  # -- Time (second) to keep a finished job before cleaning up
  ttlSecondsAfterFinished: 86400

  # -- Resource limits and requests for Ook linkcheck-recheck pods
  resources: {}

  # -- Annotations for Ook linkcheck-recheck pods
  podAnnotations: {}

  # -- Node selection rules for Ook linkcheck-recheck pods
  nodeSelector: {}

  # -- Tolerations for Ook linkcheck-recheck pods
  tolerations: []

  # -- Affinity rules for Ook linkcheck-recheck pods
  affinity: {}

intersphinxRefresh:
  # -- Enable the intersphinx-refresh job
  enabled: false

  # -- Cron schedule string for the ook intersphinx-refresh job (UTC)
  schedule: "15 * * * *"

  # -- Time (second) to keep a finished job before cleaning up
  ttlSecondsAfterFinished: 86400

  # -- Resource limits and requests for Ook intersphinx-refresh pods
  resources: {}

  # -- Annotations for Ook intersphinx-refresh pods
  podAnnotations: {}

  # -- Node selection rules for Ook intersphinx-refresh pods
  nodeSelector: {}

  # -- Tolerations for Ook intersphinx-refresh pods
  tolerations: []

  # -- Affinity rules for Ook intersphinx-refresh pods
  affinity: {}

ingestLsstTexmf:
  # -- Enable the ingest-lsst-texmf job
  enabled: false

  # -- Git ref to use for the ingest-lsst-texmf job
  gitRef: "main"

  # -- Cron schedule string for inget-lsst-texmf job (UTC)
  schedule: "0 10 * * *"

  # -- Time (second) to keep a finished job before cleaning up
  ttlSecondsAfterFinished: 86400

  # -- Resource limits and requests for job pods
  resources: {}

  # -- Annotations for job pods
  podAnnotations: {}

  # -- Node selection rules for job pods
  nodeSelector: {}

  # -- Tolerations for job pods
  tolerations: []

  # -- Affinity rules for job pods
  affinity: {}

cloudsql:
  # -- Enable the Cloud SQL Auth Proxy sidecar, used with Cloud SQL databases
  # on Google Cloud
  enabled: false

  image:
    # -- Cloud SQL Auth Proxy image to use
    repository: "gcr.io/cloudsql-docker/gce-proxy"

    # -- Cloud SQL Auth Proxy tag to use
    tag: "1.38.1"

    # -- Pull policy for Cloud SQL Auth Proxy images
    pullPolicy: "IfNotPresent"

    # -- Resource requests and limits for Cloud SQL pod
    # @default -- See `values.yaml`
    resources:
      limits:
        cpu: "100m"
        memory: "30Mi"
      requests:
        cpu: "5m"
        memory: "15Mi"

  # -- Instance connection name for a Cloud SQL PostgreSQL instance
  instanceConnectionName: ""

  # -- The Google service account that has an IAM binding to the `ook`
  # Kubernetes service accounts and has the `cloudsql.client` role
  serviceAccount: ""
