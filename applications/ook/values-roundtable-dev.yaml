image:
  # Deploy the branch image built from lsst-sqre/ook#298 (DM-55600) to test
  # the intersphinx inventory cache service with ETag/304 revalidation
  # (lsst-sqre/ook#284 merged to main plus lsst-sqre/ook#294). Remove this
  # override once the feature ships in a tagged release.
  tag: "tickets-DM-55600"
  pullPolicy: Always

config:
  logLevel: "DEBUG"
  databaseUrl: "postgresql://ook@localhost/ook"
  algolia:
    documentIndex: "ook_documents_test"
  updateSchema: true
  migrateCountryCodes: true

audit:
  enabled: false
  schedule: "30 1 * * *"
  reingest: false

ingestUpdated:
  enabled: false

linkcheckRecheck:
  enabled: true
  schedule: "45 4 * * *"

intersphinxRefresh:
  enabled: true
  schedule: "15 * * * *"

ingestLsstTexmf:
  enabled: true

cloudsql:
  enabled: true
  instanceConnectionName: "roundtable-dev-abe2:us-central1:roundtable-dev-572a252e"
  serviceAccount: "ook-sa@roundtable-dev-abe2.iam.gserviceaccount.com"
