apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ppdb-replication.fullname" . }}-exporter
  labels:
    {{- include "ppdb-replication.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ppdb-replication.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ppdb-replication.selectorLabels" . | nindent 8 }}
      annotations:
        # Force the pod to restart when the config maps are updated.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      volumes:
        - name: gcp-credentials-file
          secret:
            secretName: ppdb-replication
            items:
              - key: gcp-credentials.json
                path: gcp-credentials.json
        - name: "ppdb-replication-secrets-raw"
          secret:
            secretName: {{ include "ppdb-replication.fullname" . }}
        - name: "ppdb-replication-secrets"
          emptyDir:
            sizeLimit: "100Mi"
        {{- with .Values.config.volumes }}
        {{- . | toYaml | nindent 8 }}
        {{- end }}
      initContainers:
        - name: fix-secret-permissions
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              cp -RL /tmp/ppdb-replication-secrets-raw/* /app/secrets/
              chown 8286:4085 /app/secrets/*
              chmod 0400 /app/secrets/*
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: "ppdb-replication-secrets"
              mountPath: "/app/secrets"
            - name: "ppdb-replication-secrets-raw"
              mountPath: "/tmp/ppdb-replication-secrets-raw"
              readOnly: true
      containers:
        - name: "{{ .Chart.Name }}-export-chunks"
          envFrom:
            - configMapRef:
                name: "ppdb-replication"
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: "/app/secrets/aws-credentials.ini"
            - name: PGPASSFILE
              value: "/app/secrets/postgres-credentials.txt"
            - name: LSST_DB_AUTH
              value: "/app/secrets/db-auth.yaml"
            - name: S3_ENDPOINT_URL
              value: {{ .Values.config.s3EndpointUrl | quote }}
            - name: LSST_RESOURCES_S3_PROFILE_{{ .Values.config.additionalS3ProfileName }}
              value: {{ .Values.config.additionalS3ProfileUrl | quote }}
            - name: LSST_DISABLE_BUCKET_VALIDATION
              value: {{ .Values.config.disableBucketValidation | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/secrets/gcp-credentials.json"
            - name: DAX_APDB_MONITOR_CONFIG
              value: "logging:lsst.dax.ppdb.metrics,lsst.dax.ppdb.bigquery.ppdb_bigquery,-any"
          volumeMounts:
            - name: "ppdb-replication-secrets"
              mountPath: "/app/secrets"
              readOnly: true
            {{- with .Values.config.volumeMounts }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          args:
            - "--log-level={{ .Values.config.logLevel }}"
            - "run"
            - {{ .Values.config.apdbConfig | quote }}
            - {{ .Values.config.ppdbConfig | quote }}
            - "--min-wait-time={{ .Values.config.minWaitTime }}"
            - "--max-wait-time={{ .Values.config.maxWaitTime }}"
            - "--check-interval={{ .Values.config.checkInterval }}"
        - name: cloud-sql-proxy
          image: "{{ .Values.cloudSqlProxy.image.repository }}:{{ .Values.cloudSqlProxy.image.tag }}"
          imagePullPolicy: {{ .Values.cloudSqlProxy.image.pullPolicy | quote }}
          args:
            - {{ .Values.cloudSqlProxy.config.instanceUri | quote }}
            - "--http-address=$(POD_IP)"
            - "--http-port=9090"
            - "--port=5432"
            - "--credentials-file=/app/secrets/gcp-credentials.json"
            - "--auto-iam-authn"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 1
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.cloudSqlProxy.resources | nindent 12 }}
          volumeMounts:
            - name: gcp-credentials-file
              mountPath: /app/secrets/gcp-credentials.json
              subPath: gcp-credentials.json
              readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 8286  # jeremym
        runAsGroup: 4085  # rubin_users
        fsGroup: 4085 # rubin_users
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
