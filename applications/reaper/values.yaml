# Default values for reaper.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Override the base name for resources
nameOverride: ""

# -- Override the full name for resources (includes the release name)
fullnameOverride: ""

# Cronjobs to handle bucket and task creation for alert generation.
cronjob:
  image:
    # -- repository for rubin-influx-tools, which supplies tools and dashboards
    repository: ghcr.io/lsst-sqre/rsp-reaper
    # -- tag for rubin-influx-tools
    # @default -- the appVersion of the chart
    tag: ""
    # -- imagePullPolicy for cronjobs
    pullPolicy: "IfNotPresent"

  # -- set to true to enable debug logging
  debug: false

  # -- schedule for running reaper
  schedule: "13 05 * * *"

  # -- Resource requests and limits for reaper
  resources:
    limits:
      cpu: "1"
      memory: "512Mi"
    requests:
      cpu: "10m"
      memory: "128Mi"

  # -- Google service account, if needed, for Workload Identity
  serviceAccount: ""

config:
  registries: []

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Base URL for the environment
  # @default -- Set by Argo CD
  baseUrl: null

  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
