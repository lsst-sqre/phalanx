apiVersion: gafaelfawr.lsst.io/v1alpha1
kind: GafaelfawrIngress
metadata:
  name: usertap-authenticated
  labels:
    {{- include "usertap.labels" . | nindent 4 }}
config:
  scopes:
    all:
      - "read:tap"
  service: usertap
  delegate:
    internal:
      scopes: ["read:tap"]
      service: usertap
    useAuthorization: true
template:
  metadata:
    name: usertap-authenticated
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "1800"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
      # nginx.ingress.kubernetes.io/rewrite-target: "/usertap/$2"
      # nginx.ingress.kubernetes.io/proxy-redirect-from: "http://{{ .Values.global.host }}/youcat/"
      # nginx.ingress.kubernetes.io/proxy-redirect-to: "https://{{ .Values.global.host }}/api/youcat/"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/configuration-snippet: |
        more_set_headers "server: OpenCADC/cadc-rest";
  spec:
    rules:
      - host: {{ required "global.host must be set" .Values.global.host | quote }}
        http:
          paths:
            - path: "/youcat(/|$)(.*)"
              pathType: "ImplementationSpecific"
              backend:
                service:
                  name: usertap
                  port:
                    number: 80
