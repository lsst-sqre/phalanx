# Default values for usertap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null

image:
  # -- YouCat image
  repository: "images.opencadc.org/core/youcat"

  # -- Tag for YouCat image
  tag: "0.9.6"

  # -- Pull policy YouCat image
  pullPolicy: "IfNotPresent"

youcat:
  tapadm:
    # -- Username for the tap admin database user
    username: usertap
    # -- Connection info for the tap admin database
    url: "jdbc:postgresql://localhost/usertap"
  tapuser:
    # -- Username for the tap user database user
    username: usertap
    # -- Connection info for the tap user database
    url: "jdbc:postgresql://localhost/usertap"
  uws:
    # -- Username for the tap uws database user
    username: usertap
    # -- Username for the tap uws database user
    url: "jdbc:postgresql://localhost/usertap"

cloudsql:
  # -- Enable the Cloud SQL Auth Proxy sidecar, used with Cloud SQL databases
  # on Google Cloud
  enabled: false

  image:
    # -- Cloud SQL Auth Proxy image to use
    repository: "gcr.io/cloudsql-docker/gce-proxy"

    # -- Cloud SQL Auth Proxy tag to use
    tag: "1.38.0"

    # -- Pull policy for Cloud SQL Auth Proxy images
    pullPolicy: "IfNotPresent"

  # -- Instance connection name for a Cloud SQL PostgreSQL instance
  # @default -- None, must be set if Cloud SQL is used
  instanceConnectionName: null

  # -- The Google service account that has an IAM binding to the `grafana`
  # Kubernetes service account and has the `cloudsql.client` role
  # @default -- None, must be set if Cloud SQL Auth Proxy is enabled
  serviceAccount: ""

  # -- Resource limits and requests for the Cloud SQL Proxy container
  # @default -- See `values.yaml`
  resources:
    limits:
      cpu: "1"
      memory: "30Mi"
    requests:
      cpu: "5m"
      memory: "15Mi"

