apiVersion: apps/v1
kind: Deployment
metadata:
  name: "alloydb-auth-proxy"
  labels:
    {{- include "alloydb-auth-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alloydb-auth-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "alloydb-auth-proxy.selectorLabels" . | nindent 8 }}
        # The imaging caching agent deployed at USDF doesn't work with gcr.io
        # container registry.  This label disables the proxy.
        kube-image-keeper.enix.io/image-caching-policy: ignore
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
      automountServiceAccountToken: false
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command: ["alloydb-auth-proxy", "--health-check", "--public-ip", "--address", "0.0.0.0", "{{ .Values.config.instance_uri }}"]
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: "alloydb-auth-proxy"
                  key: "gcs-creds"
          ports:
            - name: "http"
              containerPort: 9090
              protocol: "TCP"
            - name: "postgres"
              containerPort: 5432
              protocol: "TCP"
          readinessProbe:
            httpGet:
              path: "/readiness"
              port: "http"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
            readOnlyRootFilesystem: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
