# service writes artifacts that eventually resolve to the path
#   /sdf/group/rubin/shared/campaigns/users/usdf-cm-dev/<production>/<campaign>/
# outputVolume: mounted at the container's path /output
#  sdf-data-rubin == /sdf/group/rubin
#  sdf-group-rubin == /sdf/group/rubin
---
internalDB: true
config:
  logLevel: "DEBUG"
  logProfile: "development"
  db:
    hostname: "postgres.postgres"
    echo: true
  outputVolume:
    storageClassName: "sdf-data-rubin"
    subPath: "shared/campaigns/users/usdf-cm-dev"
    mountPath: "/sdf/group/rubin/shared/campaigns/users/usdf-cm-dev"
  butler:
    storageClassName: "sdf-data-rubin"
    subPath: "repo/main"
    mountPath: "/sdf/group/rubin/repo/main"
    repositories:
      "/repo/main": "/sdf/group/rubin/repo/main/butler.yaml"
      "/repo/main+sasquatch_dev": "/sdf/group/rubin/repo/main/butler+sasquatch_dev.yaml"

image:
  tag: "tickets-DM-48560-resources"
  pullPolicy: Always
worker:
  image:
    tag: "tickets-DM-48560-resources"
    pullPolicy: Always
  htcondor:
    config:
      mountPath: "/usr/local/etc"
      contents: |
        CONDOR_HOST = sdfiana012.sdf.slac.stanford.edu
        COLLECTOR_HOST = sdfiana012.sdf.slac.stanford.edu
        SCHEDD_HOST = sdfiana012.sdf.slac.stanford.edu
        SEC_CLIENT_AUTHENTICATION_METHODS = FS, FS_REMOTE
        use security:recommended_v9_0
        SEC_DEFAULT_AUTHENTICATION_METHODS = FS_REMOTE, IDTOKENS, FS
        SEC_DAEMON_AUTHENTICATION_METHODS = FS_REMOTE, IDTOKENS, FS
        SEC_READ_AUTHENTICATION_METHODS = FS_REMOTE, IDTOKENS, FS
        FS_REMOTE_DIR = /sdf/group/rubin/services/htcondor/shared
    fsRemoteDir:
      storageClassName: "sdf-group-rubin"
      subPath: "services/htcondor/shared"
      mountPath: "/sdf/group/rubin/services/htcondor/shared"
