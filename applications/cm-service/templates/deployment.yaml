apiVersion: apps/v1
kind: Deployment
metadata:
  name: "cm-service"
  labels:
    {{- include "cm-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cm-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cm-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      containers:
        - name: {{ .Chart.Name }}
          env:
            - name: CM_ARQ_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: CM_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: CM_URL_PREFIX
              value: {{ .Values.config.pathPrefix | quote }}
            - name: CM_DATABASE_URL
              value: "postgresql://cm-service@cm-service-pg-rw/cm-service"
            - name: CM_DATABASE_ECHO
              value: {{ .Values.config.databaseEcho | quote }}
            - name: CM_LOG_PROFILE
              value: {{ .Values.config.logProfile | quote }}
            - name: CM_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: CM_ARQ_REDIS_URL
              value: "redis://cm-service-redis/1"
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: "http"
              containerPort: 8080
              protocol: "TCP"
          readinessProbe:
            httpGet:
              path: "/"
              port: "http"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: "/output"
              name: "output-volume"
              {{- if .Values.config.outputVolume.subPath }}
              subPath: {{ .Values.config.outputVolume.subPath }}
              {{- end }}
        - name: {{ .Chart.Name }}-worker
          image: "{{ .Values.config.workerImage }}"
          volumeMounts:
            - mountPath: "/output"
              name: "output-volume"
              {{- if .Values.config.outputVolume.subPath }}
              subPath: {{ .Values.config.outputVolume.subPath }}
              {{- end }}
      volumes:
        - name: output-volume
          persistentVolumeClaim:
            claimName: cm-service-output
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 17951
        runAsGroup: 1126
