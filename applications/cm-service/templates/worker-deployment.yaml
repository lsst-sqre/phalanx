apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-worker
  labels:
    {{- include "application.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "application.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "worker"
  template:
    metadata:
      annotations:
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "application.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: "worker"
    spec:
      securityContext:
        runAsUser: 17951
        runAsGroup: 1126
        fsGroup: 1126
        runAsNonRoot: true
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      containers:
        - name: "{{ .Chart.Name }}-worker"
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: "http"
              containerPort: 8080
              protocol: "TCP"
          readinessProbe:
            httpGet:
              path: "/healthz"
              port: "http"
          livenessProbe:
            httpGet:
              path: "/healthz"
              port: "http"
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-env
            - configMapRef:
                name: {{ .Chart.Name }}-butler-env
            - configMapRef:
                name: {{ .Chart.Name }}-htcondor-env
          env:
            - name: BUTLER__AUTHENTICATION_FILE
              value: "/var/run/secrets/db-auth.yaml"
            - name: DB__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cm-service
                  key: internalDatabasePassword
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
            # readOnlyRootFilesystem: true
          volumeMounts:
            {{- with .Values.config.outputVolume }}
            - mountPath: {{ .mountPath }}
              name: output-volume
              subPath: {{ .subPath }}
            {{- end }}
            {{- with .Values.config.butler }}
            - mountPath: {{ .mountPath }}
              name: butler-repo-volume
              subPath: {{ .subPath }}
            {{- end }}
            - mountPath: "/tmp"
              name: "tmp-volume"
            {{- with .Values.worker.htcondor.fsRemoteDir }}
            - mountPath: {{ .mountPath }}
              name: condor-remote-volume
              subPath: {{ .subPath }}
            {{- end }}
            - name: butler-registry-volume
              mountPath: "/var/run/secrets"
              readonly: true
      volumes:
        - name: output-volume
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-output
        - name: butler-repo-volume
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-butler
        - name: tmp-volume
          emptyDir:
            sizeLimit: 500Mi
        - name: condor-remote-volume
          persistentVolumeClaim:
            claimName: {{ $.Chart.Name }}-htcondor
        - name: butler-registry-volume
          secret:
            secretName: cm-service-butler
            items:
              - key: butler-registry
                path: db-auth.yaml
                mode: 0600
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
