# Default values for cm-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of web deployment pods to start
replicaCount: 1

image:
  # -- Image to use in the cm-service deployment
  repository: "ghcr.io/lsst-dm/cm-service"

  # -- Pull policy for the cm-service image
  pullPolicy: "IfNotPresent"

  # -- Tag of image to use
  # @default -- The appVersion of the chart
  tag: null

config:

  # -- Whether to echo SQLAlchemy generated SQL to the log
  databaseEcho: false

  # -- Logging level
  logLevel: "INFO"

  # -- Logging profile (`production` for JSON, `development` for
  # human-friendly)
  logProfile: "production"

  outputVolume:
    # -- If specified, name of storage class requested in service output area PVC
    storageClassName: null
    # -- Minimum storage requested in service output area PVC
    storage: 1Gi
    # -- If specified, sub-path within bound PV to be mounted at service output area
    subPath: null

  # -- URL path prefix
  pathPrefix: "/cm-service/v1"

  # -- Image tag for utility stack container
  workerImage: "ghcr.io/lsst-dm/cm-service-worker"

ingress:
  # -- Additional annotations for the ingress rule
  annotations: {}

# -- Affinity rules for the cm-service deployment pod
affinity: {}

# -- Node selection rules for the cm-service deployment pod
nodeSelector: {}

# -- Annotations for the cm-service deployment pod
podAnnotations: {}

# -- Resource limits and requests for the cm-service deployment pod
# @default -- See `values.yaml`
resources: {}

# -- Tolerations for the cm-service deployment pod
tolerations: []

redis:
  config:
    secretName: "redis-secret"
    secretKey: "password"

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Base URL for the environment
  # @default -- Set by Argo CD
  baseUrl: null

  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
