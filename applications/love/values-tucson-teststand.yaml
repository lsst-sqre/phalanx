love-commander:
  image:
    repository: ts-dockerhub.lsst.org/love-commander
    pullPolicy: Always
  env:
    S3_INSTANCE: tuc
    AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
  envSecrets:
  - name: AWS_ACCESS_KEY_ID
    key: aws-access-key-id
  - name: AWS_SECRET_ACCESS_KEY
    key: aws-secret-access-key
  service:
    enabled: true
    port: 5000
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 350Mi
    limits:
      cpu: 500m
      memory: 1050Mi

x-manager-producer:
  &base-manager-producer
  image:
    repository: ts-dockerhub.lsst.org/love-manager
    pullPolicy: Always
  env:
    LOVE_SITE: tucson
    SERVER_URL: tucson-teststand.lsst.codes
    OLE_API_HOSTNAME: tucson-teststand.lsst.codes
    AUTH_LDAP_1_SERVER_URI: ldap://ipa1.tu.lsst.org
    AUTH_LDAP_2_SERVER_URI: ldap://ipa2.tu.lsst.org
    AUTH_LDAP_3_SERVER_URI: ldap://ipa3.tu.lsst.org
    COMMANDER_HOSTNAME: love-commander-service
    COMMANDER_PORT: 5000
    DB_HOST: postgresdb01.tu.lsst.org
    DB_ENGINE: postgresql
    DB_NAME: love
    DB_PORT: 5432
    DB_USER: love
    HEARTBEAT_QUERY_COMMANDER: false
    JIRA_API_HOSTNAME: rubinobs.atlassian.net
    JIRA_PROJECT_ID: 10063
    REDIS_CONFIG_CAPACITY: 100
    REDIS_CONFIG_EXPIRY: 5
    REDIS_HOST: love-manager-redis-service
    REMOTE_STORAGE: true
    URL_SUBPATH: /love
  envSecrets:
    SECRET_KEY: manager-secret-key
    PROCESS_CONNECTION_PASS: process-connection-pass
    ADMIN_USER_PASS: admin-user-pass
    USER_USER_PASS: user-user-pass
    CMD_USER_PASS: cmd-user-pass
    AUTH_LDAP_BIND_PASSWORD: auth-ldap-bind-password
    DB_PASS: db-pass
    REDIS_PASS: redis-pass
  resources:
    requests:
      cpu: 150m
      memory: 200Mi
    limits:
      cpu: 1000m
      memory: 1500Mi
  readinessProbe:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 20
    periodSeconds: 10
  autoscaling:
    enabled: false

love-manager:
  manager:
    frontend:
      image:
        repository: ts-dockerhub.lsst.org/love-manager
        pullPolicy: Always
      env:
        SERVER_URL: tucson-teststand.lsst.codes
        OLE_API_HOSTNAME: tucson-teststand.lsst.codes
        AUTH_LDAP_1_SERVER_URI: ldap://ipa1.tu.lsst.org
        AUTH_LDAP_2_SERVER_URI: ldap://ipa2.tu.lsst.org
        AUTH_LDAP_3_SERVER_URI: ldap://ipa3.tu.lsst.org
        DB_HOST: postgresdb01.tu.lsst.org
        LOVE_SITE: tucson
        NIGHTREPORT_MAIL_ADDRESS: saranda@lsst.org
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 25
        targetCPUUtilizationPercentage: 50
        scaleDownPolicy:
          policies:
          - type: Pods
            value: 2
            periodSeconds: 120
          - type: Percent
            value: 10
            periodSeconds: 120
          selectPolicy: Min
      resources:
        requests:
          cpu: 150m
          memory: 200Mi
        limits:
          cpu: 1000m
          memory: 1500Mi
      readinessProbe:
        tcpSocket:
          port: 8000
        initialDelaySeconds: 20
        periodSeconds: 10
    producers:
    - name: general
      <<: *base-manager-producer
      replicas: 10
    - name: atqueue
      <<: *base-manager-producer
      replicas: 1
    - name: mtqueue
      <<: *base-manager-producer
      replicas: 1
    - name: ocsqueue
      <<: *base-manager-producer
      replicas: 1
    - name: m1m3
      <<: *base-manager-producer
      replicas: 1
  redis:
    image:
      repository: redis
      tag: '7'
      pullPolicy: IfNotPresent
    config: |
      timeout 60
      save ""
    resources:
      requests:
        cpu: 250m
        memory: 300Mi
      limits:
        cpu: 2500m
        memory: 1000Mi
  viewBackup:
    enabled: true
    image:
      repository: ts-dockerhub.lsst.org/love-view-backup
      pullPolicy: Always
    schedule: 0 12 * * *
    resources:
      requests:
        cpu: 5m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 500Mi

love-nginx:
  image:
    repository: nginx
    tag: 1.25.1
    pullPolicy: Always
  ingress:
    hostname: tucson-teststand.lsst.codes
    httpPath: /love
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  initContainers:
    frontend:
      image:
        repository: ts-dockerhub.lsst.org/love-frontend-k8s
        pullPolicy: Always
    manager:
      image:
        repository: ts-dockerhub.lsst.org/love-manager-static
        pullPolicy: Always
      command:
      - /bin/sh
      - -c
      - mkdir -p /usr/src/love-manager; cp -Rv /usr/src/love/manager/media /usr/src/love-manager; cp -Rv /usr/src/love/manager/static /usr/src/love-manager
  staticStore:
    name: love-nginx-static
    storageClass: rook-ceph-block
    accessMode: ReadWriteOnce
    claimSize: 2Gi
  nginxConfig: |
    server {
      listen 80;
      server_name localhost;
      location /love {
        root   /usr/src/love-frontend;
        try_files $uri$args $uri$args/ $uri/ /love/index.html;
      }
      location /love/manager {
          client_max_body_size 5M;
          proxy_pass http://love-manager-frontend-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/manager/producers {
          proxy_pass http://love-manager-producer-general-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/manager/m1m3 {
          proxy_pass http://love-manager-producer-m1m3-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/manager/atqueue {
          proxy_pass http://love-manager-producer-atqueue-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/manager/mtqueue {
          proxy_pass http://love-manager-producer-mtqueue-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/manager/ocsqueue {
          proxy_pass http://love-manager-producer-ocsqueue-service:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_redirect off;
      }
      location /love/media {
          alias /usr/src/love-manager/media;
      }
      location /love/manager/static {
          alias /usr/src/love-manager/static;
      }
      location /love/manager/media {
          alias /usr/src/love-manager/media;
      }
      location /love/simcam {
          proxy_pass http://simulation-gencam-service.calsys:5013/;
          proxy_set_header Host $host/love;
      }
    }
  loveConfigs:
  - name: default
    config: |
      {
        "alarms": {
          "minSeveritySound": "warning",
          "minSeverityNotification": "warning"
        },
        "camFeeds": {
          "simcam": "/love/simcam"
        },
        "efd": {
          "defaultEfdInstance": "tucson_teststand_efd",
          "urlStatus": "https://tucson-teststand.lsst.codes/influxdb/health"
        },
        "sal": {
          "urlStatus": "https://tucson-teststand.lsst.codes/sasquatch-rest-proxy/brokers",
          "expectedBrokerList": [3, 4, 5]
        }
      }
  - name: serious-alarms
    config: |
      {
        "alarms": {
          "minSeveritySound": "serious",
          "minSeverityNotification": "warning"
        },
        "camFeeds": {
          "simcam": "/love/simcam"
        },
        "efd": {
          "defaultEfdInstance": "tucson_teststand_efd",
          "urlStatus": "https://tucson-teststand.lsst.codes/influxdb/health"
        },
        "sal": {
          "urlStatus": "https://tucson-teststand.lsst.codes/sasquatch-rest-proxy/brokers",
          "expectedBrokerList": [3, 4, 5]
        }
      }
  - name: no-alarms
    config: |
      {
        "alarms": {
          "minSeveritySound": "mute",
          "minSeverityNotification": "warning"
        },
        "camFeeds": {
          "simcam": "/love/simcam"
        },
        "efd": {
          "defaultEfdInstance": "tucson_teststand_efd",
          "urlStatus": "https://tucson-teststand.lsst.codes/influxdb/health"
        },
        "sal": {
          "urlStatus": "https://tucson-teststand.lsst.codes/sasquatch-rest-proxy/brokers",
          "expectedBrokerList": [3, 4, 5]
        }
      }

