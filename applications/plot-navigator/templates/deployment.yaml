apiVersion: apps/v1
kind: Deployment
metadata:
  name: plot-navigator
  labels:
    {{- include "plot-navigator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "plot-navigator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nodejs
  template:
    metadata:
      labels:
        {{- include "plot-navigator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nodejs
    spec:
      volumes:
        {{- with .Values.config.volumes }}
        {{- . | toYaml | nindent 8 }}
        {{- end }}
        - name: "butler-secrets-raw"
          secret:
            secretName: {{ include "plot-navigator.fullname" . }}
        - name: "butler-secrets"
          emptyDir:
            sizeLimit: 50Mi
      containers:
      - name: plot-navigator
        image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion}}
        imagePullPolicy: Always
        env:
{{- range $key, $value := .Values.environment }}
          - name: {{ $key | quote }}
            value: {{ $value | quote }}
{{- end }}
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ include "plot-navigator.fullname" . }}
                key: S3_KEY
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "plot-navigator.fullname" . }}
                key: S3_SECRET
          - name: REDIS_HOST
            value: "plot-navigator-redis"
          - name: REDIS_PORT
            value: "6379"
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: password
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- if .Values.config.envFromSecretPath }}
        envFrom:
          - secretRef: {{ include "plot-navigator.fullname" . }}
        {{- end }}
        {{- if .Values.config.volume_mounts }}
        volumeMounts:
          {{- with .Values.config.volume_mounts }}
          {{- . | toYaml | nindent 10 }}
          {{- end }}
          - name: "butler-secrets"
            mountPath: "/opt/lsst/butler/secrets"
        {{- end }}
      initContainers:
        # To deal with the Postgres file permission issues,
        # copy the secrets from butler-secrets-raw to butler-secrets.
        - name: fix-secret-permissions
          image: "alpine:latest"
          imagePullPolicy: IfNotPresent
          command:
            - "/bin/ash"
            - "-c"
            - |
              cp -RL /secrets-raw/* /opt/lsst/butler/secrets/
              chown 1000:4085 /opt/lsst/butler/secrets/*
              chmod 0400 /opt/lsst/butler/secrets/*
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
          volumeMounts:
            - name: "butler-secrets"
              mountPath: "/opt/lsst/butler/secrets"
            - name: "butler-secrets-raw"
              mountPath: "/secrets-raw"
              readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 4085
