replicaCount: 4

config:
  cleanupInterval: "1h"
  volumes:
    sharedWorkarea:
      nfs:
        path: "/firefly-share/shared-workarea"
        server: "10.231.144.4"
    privateWorkarea:
      pvc:
        size: "40Gi"
        storageClass: "standard-rwo"
  ssotap: "ssotap"
  hipsListUrl: "https://data.lsst.cloud/api/hips/v2/dp2/list"
  hipsUrl: "https://data.lsst.cloud/api/hips/v2/dp2/color_gri"

redis:
  persistence:
    enabled: true
    size: "32Gi"
    storageClass: "standard-rwo"
  resources:
    limits:
      memory: "1Gi"

resources:
  limits:
    cpu: "6"
    memory: "90Gi"
  requests:
    cpu: "1"
    memory: "16Gi"
