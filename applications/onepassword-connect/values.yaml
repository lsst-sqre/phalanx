# Default values for onepassword-connect.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

connect:
  connect:
    api:
      # -- Resource requests and limits for connect-api pod
      # @default -- see `values.yaml`
      resources:
        limits:
          cpu: "1"
          memory: "52Mi"
        requests:
          cpu: "50m"
          memory: "52Mi"

    # -- Name of secret containing the 1Password credentials
    credentialsName: "onepassword-connect-secret"

    # -- Name of key inside secret containing 1Password credentials
    credentialsKey: "op-session"

    # -- Type of service to create
    serviceType: "ClusterIP"

    # -- Tolerations for the connect-api pod
    # @default -- Tolerate GKE amd64 and arm64 taints
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "amd64"
        effect: "NoSchedule"
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: ""

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: ""
