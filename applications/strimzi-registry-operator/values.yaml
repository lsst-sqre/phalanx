# Default values for strimzi-registry-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  # -- The repository for the container with the operator application
  repository: ghcr.io/lsst-sqre/strimzi-registry-operator

  # -- Tag of the image
  # @default -- The appVersion of the chart
  tag: ""

# -- Name of the Strimzi Kafka cluster
clusterName: ""

# -- Namespace where the Strimzi Kafka cluster is deployed
clusterNamespace: ""

# -- Namespace where the strimzi-registry-operator is deployed
operatorNamespace: strimzi-registry-operator


# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
