apiVersion: apps/v1
kind: Deployment
metadata:
  name: "conesearch"
  labels:
    {{- include "conesearch.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "conesearch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "conesearch.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      containers:
        - name: {{ .Chart.Name }}
          env:
            {{- if .Values.config.metrics.enabled }}
            - name: "KAFKA_BOOTSTRAP_SERVERS"
              valueFrom:
                secretKeyRef:
                  name: "conesearch-kafka"
                  key: "bootstrapServers"
            - name: "KAFKA_CLIENT_CERT_PATH"
              value: "/etc/conesearch-kafka/user.crt"
            - name: "KAFKA_CLIENT_KEY_PATH"
              value: "/etc/conesearch-kafka/user.key"
            - name: "KAFKA_CLUSTER_CA_PATH"
              value: "/etc/conesearch-kafka/ca.crt"
            - name: "KAFKA_SECURITY_PROTOCOL"
              valueFrom:
                secretKeyRef:
                  name: "conesearch-kafka"
                  key: "securityProtocol"
            {{- end }}
            {{- if .Values.config.slackAlerts }}
            - name: "CONESEARCH_SLACK_WEBHOOK"
              valueFrom:
                secretKeyRef:
                  name: "conesearch"
                  key: "slack-webhook"
            {{- end }}
          envFrom:
            - configMapRef:
                name: "conesearch"
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: "http"
              containerPort: 8080
              protocol: "TCP"
          readinessProbe:
            httpGet:
              path: "/"
              port: "http"
          livenessProbe:
            httpGet:
              path: "/"
              port: "http"
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "all"
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: "config"
              mountPath: "/etc/conesearch"
              readOnly: true
            {{- if .Values.config.metrics.enabled }}
            - name: "kafka"
              mountPath: "/etc/conesearch-kafka/ca.crt"
              readOnly: true
              subPath: "ssl.truststore.crt"
            - name: "kafka"
              mountPath: "/etc/conesearch-kafka/user.crt"
              readOnly: true
              subPath: "ssl.keystore.crt"
            - name: "kafka"
              mountPath: "/etc/conesearch-kafka/user.key"
              readOnly: true
              subPath: "ssl.keystore.key"
            {{- end }}
            - name: "tmp"
              mountPath: "/tmp"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: "config"
          configMap:
            name: "conesearch"
        {{- if .Values.config.metrics.enabled }}
        - name: "kafka"
          secret:
            secretName: "conesearch-kafka"
        {{- end }}
        - name: "tmp"
          emptyDir:
            medium: "Memory"
