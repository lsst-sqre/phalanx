# Default values for conesearch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of web deployment pods to start
replicaCount: 1

image:
  # -- Image to use in the conesearch deployment
  repository: "ghcr.io/lsst-sqre/conesearch"

  # -- Pull policy for the conesearch image
  pullPolicy: "IfNotPresent"

  # -- Tag of image to use
  # @default -- The appVersion of the chart
  tag: null

config:
  # -- Logging level
  logLevel: "INFO"

  # -- Logging profile (`production` for JSON, `development` for
  # human-friendly)
  logProfile: "production"

  # -- URL path prefix
  pathPrefix: "/api/conesearch"

  # -- Whether to send alerts and status to Slack.
  slackAlerts: false

  metrics:
    # -- Whether to enable sending metrics
    enabled: false

    # -- Name under which to log metrics. Generally there is no reason to
    # change this.
    application: "conesearch"

    events:
      # -- Topic prefix for events. It may sometimes be useful to change this
      # in development environments.
      topicPrefix: "lsst.square.metrics.events"

    schemaManager:
      # -- URL of the Confluent-compatible schema registry server
      # @default -- Sasquatch in the local cluster
      registryUrl: "http://sasquatch-schema-registry.sasquatch.svc.cluster.local:8081"

      # -- Suffix to add to all registered subjects. This is sometimes useful
      # for experimentation during development.
      suffix: ""

  # -- ConeSearch collections. Each key is the collection name as it appears in
  # the URL path. Each value configures the TAP service and table to query.
  # Required keys per collection: `table`, `idColumn`, `raColumn`,
  # `decColumn`. Optional: `maxSr` (default 180.0), `maxRecords` (default
  # 10000), `verb1Columns`, `verb2Columns`.
  collections: {}

ingress:
  # -- Additional annotations for the ingress rule
  annotations: {}

autoscaling:
  # -- Enable autoscaling of the conesearch deployment
  enabled: false

  # -- Minimum number of conesearch deployment pods
  minReplicas: 1

  # -- Maximum number of conesearch deployment pods
  maxReplicas: 4

  # -- Target CPU utilization of conesearch deployment pods
  targetCPUUtilizationPercentage: 80

  # -- Target memory utilization of conesearch deployment pods
  targetMemoryUtilizationPercentage: null

# -- Affinity rules for the conesearch deployment pod
affinity: {}

# -- Node selection rules for the conesearch deployment pod
nodeSelector: {}

# -- Annotations for the conesearch deployment pod
podAnnotations: {}

# -- Resource limits and requests for the conesearch deployment pod
# @default -- See `values.yaml`
resources:
  limits:
    cpu: "1"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# -- Tolerations for the conesearch deployment pod
tolerations: []

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null

  # -- Base URL for Repertoire discovery API
  # @default -- Set by Argo CD
  repertoireUrl: null
