apiVersion: v1
kind: ServiceAccount
metadata:
  name: "grafana-datasource-syncer"
  labels:
    {{- include "google-cloud-observability.labels" . | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ required "datasourceSyncer.serviceAccount must be set to a valid Google service account" .Values.datasourceSyncer.serviceAccount | quote }}
