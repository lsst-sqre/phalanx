grafana-datasource-syncer-token:
  description: >-
    As described in https://cloud.google.com/stackdriver/docs/managed-prometheus/query#grafana-oauth:

    Google Cloud APIs all require authentication using OAuth2; however, Grafana doesn't support OAuth2 authentication for service accounts used with Prometheus data sources.
    To use Grafana with Managed Service for Prometheus, you use the data source syncer (a separate process running in a CronJob) to generate OAuth2 credentials for your Google service account and sync them to Grafana through the Grafana data source API using a token from a Grafana service account.
