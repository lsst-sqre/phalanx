ingress-nginx:
  controller:
    config:
      error-log-level: "error"
      large-client-header-buffers: "4 64k"
      proxy-buffer-size: "64k"
    service:
      type: NodePort
      nodePorts:
        http: 30080
        https: 30443
      externalTrafficPolicy: Local
    hostNetwork: false  # Disabling hostNetwork
    dnsPolicy: ClusterFirst
    kind: Deployment
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: worker01
