ingress-nginx:
  controller:
    config:
      error-log-level: "error"
      large-client-header-buffers: "4 64k"
      proxy-buffer-size: "64k"
    service:
      type: ClusterIP
      externalTrafficPolicy: null
    hostNetwork: false
    dnsPolicy: ClusterFirst
    kind: Deployment
    replicas: 1
    nodeSelector:
      kubernetes.io/hostname: worker01
    containerPort:
      http: 80
      https: 443
    hostPort:
      http: 80
      https: 443
