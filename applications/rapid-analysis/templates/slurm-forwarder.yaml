{{- if $.Values.slurmForwarder }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-log-forwarder
  labels:
    app.kubernetes.io/name: slurm-log-forwarder
  namespace: {{ $.Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: slurm-log-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: slurm-log-forwarder
    spec:
      containers:
      - name: slurm-log-forwarder
        image: "alpine:latest"
        command:
          - "/bin/sleep"
          - "600"
        volumeMounts:
        - name: sdf-group-rubin
          mountPath: "/sdf/group/rubin"
          readOnly: true
        resources:
          requests:
            cpu: 0.5
            memory: 2G
          limits:
            cpu: 0.5
            memory: 2G

      volumes:
      - name: sdf-group-rubin
        persistentVolumeClaim:
          claimName: sdf-group-rubin
{{- end }}

