image:
  repository: ghcr.io/lsst-so/rubintv_production
  tag: w_2026_13
  pullPolicy: Always
location: SUMMIT
env:
  DAF_BUTLER_REPOSITORY_INDEX: /project/data-repos.yaml
  DEPLOY_BRANCH: deploy-summit
  LSST_RESOURCES_S3_PROFILE_butler: https://s3-butler.cp.lsst.org
  AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
  BUTLER_ROLLOUT_PAUSE: 1.0
  RA_PULL_DIRECTORIES: "TARTS donut_viz drp_pipe ts_wep ts_ofc ts_config_mttcs summit_utils summit_extras rubintv_production daf_butler pipe_base"
  TARTS_DATA_DIR: /project/rubintv/aos_data/TARTS
  AI_DONUT_DATA_DIR: /project/rubintv/aos_data/AI_DONUT
  # These threading env vars are the ones set in
  # lsst.utils.disable_implicit_threading() They are being set here as well for
  # extra safety as there is a possibility that code could init before that's
  # called, at least in theory. Pods which want to take advantage of more cores
  # can override these values at runtime.
  OPENBLAS_NUM_THREADS: 1
  GOTO_NUM_THREADS: 1
  OMP_NUM_THREADS: 1
  MKL_NUM_THREADS: 1
  MKL_DOMAIN_NUM_THREADS: 1
  MPI_NUM_THREADS: 1
  NUMEXPR_NUM_THREADS: 1
  NUMEXPR_MAX_THREADS: 1
  MAGICK_THREAD_LIMIT: 1
  OMP_PROC_BIND: false
envSecrets:
- name: SENTRY_DSN
  secretName: rapid-analysis-secrets
  secretKey: sentry.dsn
securityContext:
  uid: 73006
  gid: 73006
scripts:
###
### AuxTel pods
###
- name: LATISS/runButlerWatcher.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
- name: LATISS/runHeadNode.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
- name: LATISS/runMetadataServer.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
- name: LATISS/runOneOffExpRecord.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
- name: LATISS/runOneOffPostIsr.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.0
      memory: 12G
###
### Misc pods
###
- name: summit/misc/runAllSky.py
  mounts:
  - allsky-data
  - project-shared
  resources:
    requests:
      cpu: 2.0
      memory: 6G
    limits:
      cpu: 2.0
      memory: 8G
- name: summit/misc/runTmaTelemetry.py
  mounts:
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.0
      memory: 8G
###
### LSSTCam pods
###
- name: LSSTCam/runButlerWatcher.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runHeadNode.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runMetadataServer.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runOneOffExpRecord.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 2G
    limits:
      cpu: 1.0
      memory: 3.5G
- name: LSSTCam/runOneOffPostIsr.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.0
      memory: 5G
- name: LSSTCam/runOneOffVisitImage.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 8G
    limits:
      cpu: 1.0
      memory: 10G
- name: LSSTCam/runMetadataServerAos.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runMetadataServerGuiders.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runMetadataServerRaPerformance.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runCleanup.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 0.5
      memory: 8G
    limits:
      cpu: 1.0
      memory: 25G
- name: LSSTCam/runPlotter.py
  replicas: 2
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 8G
    limits:
      cpu: 1.0
      memory: 12G
- name: LSSTCam/runPsfPlotting.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 3
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.0
      memory: 10G
- name: LSSTCam/runZernikePredictionPlotting.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 5
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.0
      memory: 12G
- name: LSSTCam/runPerformanceMonitor.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 5
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.0
      memory: 8G
- name: LSSTCam/runClusterManager.py
  mounts:
  - lsstcam-data
  - project-shared
- name: LSSTCam/runRadialPlotting.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 12G
    limits:
      cpu: 1.2
      memory: 16G
- name: LSSTCam/runFWHMPlotting.py
  mounts:
  - lsstcam-data
  - project-shared
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.0
      memory: 6G
- name: LSSTCam/runGuiderAnalysis.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 8
  resources:
    requests:
      cpu: 1.0
      memory: 6G
    limits:
      cpu: 1.2
      memory: 8G
##
## LATISS StatefulSets
##
latissWorkerSet:
  name: LATISS/runSfmRunner.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
  replicas: 5
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.0
      memory: 8G
latissGather1bSet:
  name: LATISS/runStep1bWorker.py
  mounts:
  - auxtel-data
  - auxtel-gen3-data
  - project-shared
  replicas: 2
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.0
      memory: 8G
###
### LSSTCam StatefulSets
###
lsstcamWorkerSet:
  name: LSSTCam/runSfmRunner.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 410
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.1
      memory: 8G  # we should check this value
lsstcamAosWorkerSet:
  name: LSSTCam/runAosWorker.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 32  # 4 deep keeps up for all data except when there's IT trouble
  env:
    LIMITS_CPU: 4
  resources:
    requests:
      cpu: 4.2
      memory: 4G
    limits:
      cpu: 4.2
      memory: 8G
lsstcamGather1bSet:
  name: LSSTCam/runStep1bWorker.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 12
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.1
      memory: 8G
lsstcamGather1bAosSet:
  name: LSSTCam/runStep1bAosWorker.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 4
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.1
      memory: 8G
lsstcamBacklogWorkerSet:
  name: LSSTCam/runBacklogWorker.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 50
  resources:
    requests:
      cpu: 1.0
      memory: 4G
    limits:
      cpu: 1.0
      memory: 8G
lsstcamGatherRollupSet:
  name: LSSTCam/runNightlyWorker.py
  mounts:
  - lsstcam-data
  - project-shared
  replicas: 1
  resources:
    requests:
      cpu: 1.0
      memory: 12G
    limits:
      cpu: 1.0
      memory: 24G
pullSecretsPath: pull-secret
butlerSecret:
  containerPath: /home/saluser/.lsst
  dbUser: oods
imagePullSecrets:
- name: pull-secret
nfsMountpoint:
- name: auxtel-data
  containerPath: /repo/LATISS
  readOnly: false
  server: nfs-auxtel.cp.lsst.org
  serverPath: /auxtel/repo/LATISS
- name: auxtel-gen3-data
  containerPath: /data/lsstdata/base/auxtel
  readOnly: true
  server: nfs-auxtel.cp.lsst.org
  serverPath: /auxtel/lsstdata/base/auxtel
- name: lsstcam-data
  containerPath: /repo/LSSTCam
  readOnly: false
  server: nfs-lsstcam.cp.lsst.org
  serverPath: /lsstcam/repo/LSSTCam
- name: lsstcam-gen3-data
  containerPath: /data/lsstdata/base/maintel
  readOnly: true
  server: nfs-lsstcam.cp.lsst.org
  serverPath: /lsstcam/lsstdata/base/maintel
- name: allsky-data
  containerPath: /data/allsky
  readOnly: true
  server: nfs-auxtel.cp.lsst.org
  serverPath: /auxtel/allsky
- name: project-shared
  containerPath: /project
  readOnly: false
  server: nfs-project.cp.lsst.org
  serverPath: /project
resources:
  requests:
    cpu: 0.5
    memory: 1G
  limits:
    cpu: 1.0
    memory: 2.5G
redis:
  enabled: true
  port: 6379
  env:
    MASTER: true
  envSecrets:
  - name: REDIS_PASSWORD
    secretName: rapid-analysis-secrets
    secretKey: redis-password
  storage:
    classname: rook-ceph-block
    request: 10Gi
  resources:
    requests:
      cpu: 2.0
      memory: 25Gi
    limits:
      cpu: 3.0
      memory: 50Gi
squid:
  enabled: true
  embargo: true
  podAnnotations:
    k8s.v1.cni.cncf.io/networks: "kube-system/ra-lhn"
