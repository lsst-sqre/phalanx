DOCVERSE_CREDENTIAL_ENCRYPTION_KEY:
  description: >-
    Fernet key used to encrypt credentials stored by Docverse. Changing this
    secret will invalidate all existing encrypted credentials.
  generate:
    type: fernet-key
DOCVERSE_CREDENTIAL_ENCRYPTION_KEY_RETIRED:
  description: >-
    Previous Fernet key, provided only during a credential-encryption key
    rotation so credentials encrypted under the old key can still be decrypted.
    Remove after all credentials have been re-encrypted.
  if: config.credentialKeyRotation
DOCVERSE_DATABASE_PASSWORD:
  description: >-
    Password for the PostgreSQL database used by Docverse.
DOCVERSE_GITHUB_WEBHOOK_SECRET:
  description: >-
    Secret used to validate GitHub webhooks sent to Docverse.
DOCVERSE_GITHUB_APP_PRIVATE_KEY:
  description: >-
    Private key for the GitHub App used by Docverse to access GitHub
    repositories.
  onepassword:
    encoded: true
SENTRY_DSN:
  description: >-
    DSN URL to which Sentry trace and error logging will be sent.
  if: config.sentry.enabled
slack-webhook:
  description: >-
    Slack web hook used to report internal errors to Slack. This secret may be
    changed at any time.
  if: config.slackAlerts
  copy:
    application: mobu
    key: app-alert-webhook
