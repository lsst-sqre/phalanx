DOCVERSE_CREDENTIAL_ENCRYPTION_KEY:
  description: >-
    Fernet key used to encrypt credentials stored by Docverse. Changing this
    secret will invalidate all existing encrypted credentials.
  generate:
    type: fernet-key
DOCVERSE_DATABASE_PASSWORD:
  description: >-
    Password for the PostgreSQL database used by Docverse.
slack-webhook:
  description: >-
    Slack web hook used to report internal errors to Slack. This secret may be
    changed at any time.
  if: config.slackAlerts
  copy:
    application: mobu
    key: app-alert-webhook
