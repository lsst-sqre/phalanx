apiVersion: gafaelfawr.lsst.io/v1alpha1
kind: GafaelfawrIngress
metadata:
  name: "docverse"
  labels:
    {{- include "docverse.labels" . | nindent 4 }}
config:
  scopes:
    all:
      - "exec:docverse"
  delegate:
    internal:
      service: "docverse"
      scopes: []
  service: "docverse"
template:
  metadata:
    name: "docverse"
    {{- with .Values.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  spec:
    rules:
      - host: {{ required "global.host must be set" .Values.global.host | quote }}
        http:
          paths:
            - path: {{ .Values.config.pathPrefix | quote }}
              pathType: "Prefix"
              backend:
                service:
                  name: "docverse"
                  port:
                    number: 8080

---
apiVersion: gafaelfawr.lsst.io/v1alpha1
kind: GafaelfawrIngress
metadata:
  name: "docverse-admin"
  labels:
    {{- include "docverse.labels" . | nindent 4 }}
config:
  loginRedirect: false
  scopes:
    all:
      - "admin:docverse"
  delegate:
    internal:
      service: "docverse"
      scopes: []
  service: "docverse"
template:
  metadata:
    name: "docverse-admin"
    {{- with .Values.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  spec:
    rules:
      - host: {{ required "global.host must be set" .Values.global.host | quote }}
        http:
          paths:
            - path: "{{ .Values.config.pathPrefix }}/admin"
              pathType: "Prefix"
              backend:
                service:
                  name: "docverse"
                  port:
                    number: 8080
