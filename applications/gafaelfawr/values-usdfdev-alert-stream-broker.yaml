replicaCount: 2

# Use the CSI storage class so that we can use snapshots.
redis:
  persistence:
    storageClass: "wekafs--sdf-k8s01"

config:
  internalDatabase: true

  oidcServer:
    enabled: true

  oidc:
    clientId: vcluster--usdf-alert-stream-broker-dev
    audience: "vcluster--usdf-alert-stream-broker-dev"
    loginUrl: "https://dex.slac.stanford.edu/auth"
    tokenUrl: "https://dex.slac.stanford.edu/token"
    issuer: "https://dex.slac.stanford.edu"
    scopes:
      - "openid"
      - "email"
      - "groups"
      - "profile"
    usernameClaim: "name"

  ldap:
    url: ldaps://ldap-unix.slac.stanford.edu:636
    groupBaseDn: ou=Group,dc=slac,dc=stanford,dc=edu
    groupObjectClass: posixGroup
    groupMemberAttr: memberUid
    groupSearchByDn: false
    userBaseDn: ou=Accounts,dc=slac,dc=stanford,dc=edu
    userSearchAttr: uid
    addUserGroup: false
    uidAttr: uidNumber
    gidAttr: gidNumber
    nameAttr: gecos

  groupMapping:
    "admin:token":
      - "rubinmgr"
      - "unix-admin"
    "exec:admin":
      - "rubinmgr"
      - "unix-admin"

  initialAdmins:
    - "dspeck"
    - "smart"
