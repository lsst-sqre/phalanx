aws-access-key-id:
  description: >-
    S3 access key ID for the alert archive bucket.
  if: config.s3Credentials
aws-secret-access-key:
  description: >-
    S3 secret access key for the alert archive bucket.
  if: config.s3Credentials
slack-webhook:
  description: >-
    Slack web hook used to report internal errors to Slack. This secret may be
    changed at any time.
  if: config.slackAlerts
  copy:
    application: mobu
    key: app-alert-webhook
