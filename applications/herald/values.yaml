# Default values for herald.

# -- Number of web deployment pods to start
replicaCount: 1

autoscaling:
  # -- Enable autoscaling of the herald deployment
  enabled: false

  # -- Minimum number of herald deployment pods
  minReplicas: 1

  # -- Maximum number of herald deployment pods
  maxReplicas: 4

  # -- Target CPU utilization as a percentage of requested CPU for autoscaling
  targetCPUUtilizationPercentage: 80

  # -- Target memory utilization as a percentage of requested memory for
  # autoscaling
  targetMemoryUtilizationPercentage: ""

image:
  # -- Image to use in the herald deployment
  repository: "ghcr.io/lsst-sqre/herald"

  # -- Pull policy for the herald image
  pullPolicy: "IfNotPresent"

  # -- Tag of image to use
  # @default -- The appVersion of the chart
  tag: null

config:
  # -- Logging level
  logLevel: "INFO"

  # -- Logging profile (`production` for JSON, `development` for
  # human-friendly)
  logProfile: "production"

  # -- URL path prefix
  pathPrefix: "/api/alerts"

  # -- Whether to send Slack alerts for unexpected failures
  slackAlerts: false

  # -- S3 bucket name containing the alert archive packets
  s3AlertsBucket: ""

  # -- S3 bucket name containing the Avro schema JSON files
  s3SchemasBucket: ""

  # -- S3 key prefix for alert packets.
  s3AlertsPrefix: "v2/alerts"

  # -- S3 key prefix for Avro schemas.
  s3SchemasPrefix: "v2/schemas"

  # -- Override endpoint URL for S3-compatible stores (MinIO, Ceph).
  s3EndpointUrl: ""

  # -- S3 region. Ignored by MinIO/Ceph; required when using GCS S3-compatible
  # API or AWS S3.
  s3Region: ""

  # -- Whether to mount S3 credentials (access key ID and secret) from Vault.
  # Set to true for environments that use key-based S3 auth (e.g. MinIO/Ceph
  # at USDF).
  s3Credentials: false

ingress:
  # -- Additional annotations for the ingress rule
  annotations: {}

# -- Affinity rules for the herald deployment pod
affinity: {}

# -- Node selection rules for the herald deployment pod
nodeSelector: {}

# -- Annotations for the herald deployment pod
podAnnotations: {}

# -- Resource limits and requests for the herald deployment pod
# @default -- See `values.yaml`
resources: {}

# -- Tolerations for the herald deployment pod
tolerations: []

# The following will be set by parameters injected by Argo CD and should not
# be set in the individual environment values files.
global:
  # -- Host name for ingress
  # @default -- Set by Argo CD
  host: null

  # -- Base path for Vault secrets
  # @default -- Set by Argo CD
  vaultSecretsPath: null
