controller:
  googleServiceAccount: "nublado-controller@science-platform-demo-9e05.iam.gserviceaccount.com"
  slackAlerts: true
  sentry:
    enabled: true
  config:
    dropdownMenu:
      release:
        cutoffVersion: "27.0.0"
      weekly:
        number: 26
      daily:
        number: 12
      releaseCandidate:
        cutoffVersion: "28.0.0"
      experimental:
        age: "16w"
    logLevel: "DEBUG"
    fileserver:
      enabled: true
      nodeSelector:
        cloud.google.com/gke-nodepool: "core-pool"
      volumeMounts:
        - containerPath: "/home"
          volumeName: "home"
    images:
      source:
        type: "google"
        location: "us-central1"
        projectId: "rubin-shared-services-71ec"
        repository: "sciplat"
        image: "sciplat-lab"
      # source:
      #   type: "docker"
      #   registry: "ghcr.io"
      #   repository: "lsst-sqre/sciplat-lab"
      recommendedTag: "exp_w_2025_38_multi-arm64"
    lab:
      initContainers:
        - name: "inithome"
          image:
            repository: "us-central1-docker.pkg.dev/rubin-shared-services-71ec/sciplat/inithome"
            tag: "tickets-DM-52583"
          privileged: true
          volumeMounts:
            - containerPath: "/home"
              volumeName: "home"
        - name: "landingpage"
          image:
            repository: "us-central1-docker.pkg.dev/rubin-shared-services-71ec/sciplat/rsp-landing-page-provisioner"
            tag: "tickets-DM-52583"
          volumeMounts:
            - containerPath: "/home"
              volumeName: "home"
      nodeSelector:
        cloud.google.com/gke-nodepool: "core-pool"
      env:
        DAF_BUTLER_REPOSITORY_INDEX: "https://demo.lsst.cloud/api/butler/configs/idf-repositories.yaml"
        TMPDIR: "/tmp"
      tolerations:
        - key: "kubernetes.io/arch"
          operator: "Equal"
          effect: "NoSchedule"
          value: "arm64"
      volumes:
        - name: "home"
          source:
            type: nfs
            serverPath: "/home-share"
            server: "10.235.176.36"
      volumeMounts:
        - containerPath: "/home"
          volumeName: "home"
jupyterhub:
  hub:
    db:
      url: "postgresql://nublado@cloud-sql-proxy.nublado/nublado"
cloudsql:
  enabled: true
  instanceConnectionName: "science-platform-demo-9e05:us-central1:science-platform-demo-a4dbbf96"
  serviceAccount: "nublado@science-platform-demo-9e05.iam.gserviceaccount.com"
