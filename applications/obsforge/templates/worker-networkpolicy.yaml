apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "obsforge-worker"
  labels:
    {{- include "obsforge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "obsforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "worker"
  policyTypes:
    - "Ingress"
