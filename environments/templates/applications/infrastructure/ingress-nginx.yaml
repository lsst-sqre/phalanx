{{- if (index .Values "applications" "ingress-nginx") -}}
apiVersion: v1
kind: Namespace
metadata:
  name: "ingress-nginx"
  {{- if .Values.defaultComputeClass }}
  labels:
    cloud.google.com/default-compute-class: {{ .Values.defaultComputeClass }}
  {{- end}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "ingress-nginx"
  namespace: "argocd"
  finalizers:
    - "resources-finalizer.argocd.argoproj.io"
spec:
  destination:
    namespace: "ingress-nginx"
    server: "https://kubernetes.default.svc"
  project: "infrastructure"
  source:
    path: "applications/ingress-nginx"
    repoURL: {{ .Values.repoUrl | quote }}
    targetRevision: {{ or (index .Values "revisions" "ingress-nginx") .Values.targetRevision | quote }}
    helm:
      parameters:
        - name: "global.vaultSecretsPath"
          value: {{ .Values.vaultPathPrefix | quote }}
      valueFiles:
        - "values.yaml"
        - "values-{{ .Values.name }}.yaml"
{{- end -}}
