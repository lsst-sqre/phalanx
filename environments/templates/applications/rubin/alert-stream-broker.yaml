{{- if (index .Values "applications" "alert-stream-broker") -}}
apiVersion: v1
kind: Namespace
metadata:
  name: "alert-stream-broker"
  {{- if .Values.defaultComputeClass }}
  labels:
    cloud.google.com/default-compute-class: {{ .Values.defaultComputeClass }}
  {{- end}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "alert-stream-broker"
  namespace: "argocd"
  finalizers:
    - "resources-finalizer.argocd.argoproj.io"
spec:
  destination:
    namespace: "alert-stream-broker"
    server: "https://kubernetes.default.svc"
  ignoreDifferences:
    - kind: "PersistentVolumeClaim"
      managedFieldsManagers:
        - "strimzi-cluster-operator"
  project: "rubin"
  source:
    path: "applications/alert-stream-broker"
    repoURL: {{ .Values.repoUrl | quote }}
    targetRevision: {{ or (index .Values "revisions" "alert-stream-broker") .Values.targetRevision | quote }}
    helm:
      valueFiles:
        - "values.yaml"
        - "values-{{ .Values.name }}.yaml"
{{- end -}}
