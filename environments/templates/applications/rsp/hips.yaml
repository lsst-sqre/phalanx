{{- if .Values.applications.hips -}}
apiVersion: v1
kind: Namespace
metadata:
  name: "hips"
  {{- if .Values.defaultComputeClass }}
  labels:
    cloud.google.com/default-compute-class: {{ .Values.defaultComputeClass }}
  {{- end}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "hips"
  namespace: "argocd"
  finalizers:
    - "resources-finalizer.argocd.argoproj.io"
spec:
  destination:
    namespace: "hips"
    server: "https://kubernetes.default.svc"
  project: "rsp"
  source:
    path: "applications/hips"
    repoURL: {{ .Values.repoUrl | quote }}
    targetRevision: {{ or (index .Values "revisions" "hips") .Values.targetRevision | quote }}
    helm:
      parameters:
        - name: "global.environmentName"
          value: {{ .Values.name | quote }}
        - name: "global.host"
          value: {{ .Values.fqdn | quote }}
        - name: "global.vaultSecretsPath"
          value: {{ .Values.vaultPathPrefix | quote }}
      valueFiles:
        - "values.yaml"
        - "values-{{ .Values.name }}.yaml"
{{- end -}}
